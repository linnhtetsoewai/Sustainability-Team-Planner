function renderGantt(){
  const f=state.filters;
  const ganttProjectId = f.ganttProject || '';
  const projectMilestones = ganttProjectId ? milestonesForProject(ganttProjectId) : [];
  let tasks=state.db.tasks.slice();
  if(f.ganttAsg) tasks=tasks.filter(t=>t.assigneeId===f.ganttAsg);
  if(f.ganttProject) tasks=tasks.filter(t=>t.projectId===f.ganttProject);
  tasks=tasks.sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||'')||(a.dueDate||'').localeCompare(b.dueDate||''));
  if(!tasks.length){
    if (ganttProjectId && projectMilestones.length) {
      const project = projectById(ganttProjectId);
      const milestoneDates = projectMilestones.flatMap(m => [m.kickoffDate, m.submissionDate]).filter(Boolean).map(parseGanttDate).filter(Boolean);
      const earliest = milestoneDates.length ? new Date(Math.min(...milestoneDates.map(d => Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())))) : parseGanttDate(todayISO()) || new Date();
      const latest = milestoneDates.length ? new Date(Math.max(...milestoneDates.map(d => Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())))) : parseGanttDate(todayISO()) || new Date();
      tasks = [{
        id:'__milestones__',
        name:'No task created yet',
        assigneeId:'',
        projectId:ganttProjectId,
        taskType:'internal',
        startDate:ganttIsoDate(earliest),
        dueDate:ganttIsoDate(latest),
        status:'Planned',
        priority:'Medium',
        notes: 'No task created yet',
        isMilestoneRow:true
      }];
    } else {
    const emptyMsg=state.db.tasks.length ? 'No tasks match the selected filters.' : 'No tasks to chart yet.';
    return `<h1 class="view-title">Timeline</h1><p class="view-sub">Task timelines by assignee.</p><div class="card empty">${emptyMsg}</div>`;
    }
  }
  const dayWidth=state.ganttDayWidth||48;
  const dates=tasks.flatMap(t=>[t.startDate,t.dueDate]).map(parseGanttDate).filter(Boolean);
  const minDate=dates.length ? new Date(Math.min(...dates.map(d=>Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())))) : new Date();
  const maxDate=dates.length ? new Date(Math.max(...dates.map(d=>Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())))) : new Date();
  const start=ganttStartOfWeek(ganttAddDays(minDate, -7));
  const end=ganttEndOfWeek(ganttAddDays(maxDate, 14));
  const days=[];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)) days.push(new Date(d));
  const dayCount=days.length;
  const fmtDateNum=d=>String(d.getDate()).padStart(2,'0');
  const today=new Date(); today.setHours(0,0,0,0);
  const todayIndex=ganttDayDiff(start, today);
  const overloadByTask = ganttTaskOverloadDates(tasks);
  const submissionHighlights = new Map();
  if (ganttProjectId) {
    milestonesForProject(ganttProjectId)
      .filter(m => m.submissionDate)
      .forEach(m => {
        const key = String(m.submissionDate).slice(0, 10);
        const project = projectById(m.projectId);
        const owner = personById(m.ownerId);
        const entry = submissionHighlights.get(key) || {date:key, items:[]};
        entry.items.push({
          project: project?.shortName || project?.code || 'Project',
          stage: m.stageName || 'Stage',
          label: m.submissionLabel || '',
          status: m.status || 'Planned',
          lead: owner?.name || 'Unassigned',
          notes: m.notes || ''
        });
        submissionHighlights.set(key, entry);
      });
  }
  const monthGroups=[];
  let currentMonth=null;
  days.forEach(d=>{
    const label=d.toLocaleDateString('en-GB',{month:'short', year:'numeric'}).toUpperCase();
    if(!currentMonth || currentMonth.label!==label){
      if(currentMonth) monthGroups.push(currentMonth);
      currentMonth={label, span:1};
    }else currentMonth.span++;
  });
  if(currentMonth) monthGroups.push(currentMonth);
  const monthCells=monthGroups.map(m=>`<div class="gantt-month-label" style="flex-basis:${m.span*dayWidth}px;min-width:${m.span*dayWidth}px">${esc(m.label)}</div>`).join('');
  const dayCells=days.map(d=>{
    const weekend=d.getDay()===0||d.getDay()===6;
    const isToday=d.getTime()===today.getTime();
    const key=ganttIsoDate(d);
    const highlight=submissionHighlights.get(key);
    const tip=highlight ? highlight.items.map(item => `${item.project} • ${item.stage} ${item.label ? `• ${item.label}` : ''}\nStatus: ${item.status}\nLead: ${item.lead}${item.notes ? `\nNotes: ${item.notes}` : ''}`).join('\n\n') : '';
    const compact = dayWidth < 28;
    return `<div class="gantt-day-label ${weekend?'weekend':''} ${isToday?'today':''} ${highlight?'submission':''} ${compact?'compact':''}" title="${esc(tip)}" style="flex-basis:${dayWidth}px;min-width:${dayWidth}px"><span class="date-num">${fmtDateNum(d)}</span></div>`;
  }).join('');
  const leftRows=tasks.map(t=>{
    const assignee=personById(t.assigneeId);
    const project=projectById(t.projectId);
    const projectLabel=project?.shortName || (t.taskType==='leave' ? 'Leave' : 'Internal');
    const isAllocation = String(t.taskType||'')==='allocation';
    const isMilestoneRow = t.id === '__milestones__' || t.isMilestoneRow;
    const badge = !isAllocation && t.taskType && t.taskType !== 'project' ? `<span class="badge badge-grey" style="margin-left:6px">${esc(taskTypeLabel(t))}</span>` : '';
    const stage = taskProjectStage(t) ? ` • ${taskProjectStageLabel(t)}` : '';
    const titleStyle = isAllocation ? 'color:var(--accent);font-weight:700' : '';
    if (isMilestoneRow) {
      return `<tr><td class="gantt-left gantt-task-name"><div class="gantt-task-stack" style="height:100%;justify-content:center"><b style="color:var(--accent)">${esc(t.name || 'No task created yet')}</b></div></td><td class="gantt-left gantt-assignee">—</td><td class="gantt-left gantt-project">${esc(projectLabel)}</td></tr>`;
    }
    return `<tr><td class="gantt-left gantt-task-name"><div class="gantt-task-stack" style="cursor:pointer" onclick="openTaskModal('${t.id}')"><b style="${titleStyle}">${esc(t.name)}</b>${badge}<span>${esc(t.status)}${esc(stage)}</span></div></td><td class="gantt-left gantt-assignee">${esc(firstName(assignee?.name)||'Unassigned')}</td><td class="gantt-left gantt-project">${esc(projectLabel)}</td></tr>`;
  }).join('');
  const rightRows=tasks.map(t=>{
    const isMilestoneRow = t.id === '__milestones__' || t.isMilestoneRow;
    const taskStart=parseGanttDate(t.startDate) || start;
    const taskEnd=parseGanttDate(t.dueDate) || taskStart;
    const leftDays=Math.max(0, ganttDayDiff(start, taskStart));
    const spanDays=Math.max(1, ganttDayDiff(taskStart, taskEnd) + 1);
    const leftPx=leftDays * dayWidth;
    const widthPx=Math.max(spanDays * dayWidth, dayWidth);
    const statusClass=String(t.status||'').toLowerCase().replace(/\s+/g,'-');
    const unscheduled=!(t.startDate || t.dueDate);
    const overloadDates=overloadByTask.get(t.id);
    const overloadClass=overloadDates && overloadDates.size ? ' overload' : '';
    const assignee=personById(t.assigneeId);
    const project=projectById(t.projectId);
    const projectLabel=project?.shortName || (t.taskType==='leave' ? 'Leave' : 'Internal');
    const overloadTitle=overloadDates && overloadDates.size ? ` | Overloaded days: ${[...overloadDates].map(fmtShortDate).join(', ')}` : '';
    const hourEditorsHtml = ganttTaskHourEditorsHtml(t, taskStart, dayWidth);
    const submissionOverlays = ganttProjectId ? days.map((d, i) => {
      const key = ganttIsoDate(d);
      const highlight = submissionHighlights.get(key);
      if (!highlight) return '';
      const tip = highlight.items.map(item => `${item.project} • ${item.stage} ${item.label ? `• ${item.label}` : ''}\nStatus: ${item.status}\nLead: ${item.lead}${item.notes ? `\nNotes: ${item.notes}` : ''}`).join('\n\n');
      return `<div class="gantt-submission-column" title="${esc(tip)}" style="left:${i * dayWidth}px;width:${dayWidth}px"></div>`;
    }).join('') : '';
    return `<tr>
      <td class="gantt-scale-cell">
        <div class="gantt-row-lane" style="--gantt-day-width:${dayWidth}px;min-width:${dayCount*dayWidth}px">
          ${submissionOverlays}
          <div class="gantt-grid-row">${days.map(d=>`<div class="gantt-grid-cell ${d.getDay()===0||d.getDay()===6?'weekend':''} ${d.getTime()===today.getTime()?'today':''}" style="width:${dayWidth}px;min-width:${dayWidth}px"></div>`).join('')}</div>
          ${todayIndex>=0&&todayIndex<dayCount?`<div class="gantt-today-line" style="left:${todayIndex*dayWidth}px"></div>`:''}
          ${isMilestoneRow ? '' : `<div class="gantt-bar ${statusClass}${unscheduled?' not-started':''}${overloadClass}" data-task-id="${esc(t.id)}" style="left:${leftPx}px;width:${widthPx}px${unscheduled?';opacity:0.35':''}" title="${esc(t.name)}${taskProjectStage(t) ? ` | ${esc(taskProjectStageLabel(t))}` : ''} | ${esc(assignee?.name||'Unassigned')} | ${esc(projectLabel)} | ${esc(t.startDate||'')}${t.dueDate?` - ${esc(t.dueDate)}`:''}${overloadTitle}">
            <div class="gantt-resize-handle left"></div>
            ${hourEditorsHtml ? `<div class="gantt-bar-hours-layer">${hourEditorsHtml}</div>` : ''}
            <div class="gantt-resize-handle right"></div>
          </div>`}
        </div>
      </td>
    </tr>`;
  }).join('');
  const ganttAsgOpts=['<option value="">All assignees</option>'].concat(state.db.team.map(m=>`<option value="${m.id}" ${f.ganttAsg===m.id?'selected':''}>${esc(m.name)}</option>`)).join('');
  const ganttProjectOpts=['<option value="">All projects</option>'].concat(state.db.projects.map(p=>`<option value="${p.id}" ${f.ganttProject===p.id?'selected':''}>${esc(p.shortName)}</option>`)).join('');
  return `<h1 class="view-title">Timeline</h1>
  <div class="gantt-card">
    <div class="gantt-header">
      <div class="gantt-toolbar">
        <select onchange="pushHistorySnapshot();state.filters.ganttAsg=this.value;render()">${ganttAsgOpts}</select>
        <select onchange="pushHistorySnapshot();state.filters.ganttProject=this.value;render()">${ganttProjectOpts}</select>
        <span class="spacer"></span>
        <button class="btn btn-primary btn-sm" type="button" onclick="openTaskModal(null,{startDate:'${ganttIsoDate(start)}',dueDate:'${ganttIsoDate(ganttAddDays(start,5))}'})">+ Add Task</button>
        <button class="btn btn-primary btn-sm" type="button" onclick="openAllocationModal()">+ Allocate</button>
        <div class="gantt-zoom-controls">
          <button class="btn btn-secondary btn-sm" type="button" onclick="zoomGantt(-8)" title="Zoom out">-</button>
          <button class="btn btn-secondary btn-sm" type="button" onclick="zoomGantt(8)" title="Zoom in">+</button>
        </div>
      </div>
    </div>
    <div class="gantt-shell" style="--gantt-day-width:${dayWidth}px">
      <div class="gantt-pane gantt-left-pane" id="ganttLeftPane">
        <table class="gantt-table gantt-left-table">
          <thead><tr><th class="gantt-left gantt-task-name">Task</th><th class="gantt-left gantt-assignee">Assignee</th><th class="gantt-left gantt-project">Project</th></tr></thead>
          <tbody>${leftRows}</tbody>
        </table>
      </div>
      <div class="gantt-pane gantt-right-pane">
        <div class="gantt-right-head" id="ganttRightHead">
          <div class="gantt-right-head-inner" style="width:${dayCount*dayWidth}px;min-width:${dayCount*dayWidth}px">
            <div class="gantt-axis" style="--gantt-day-width:${dayWidth}px">
              <div class="gantt-month-row">${monthCells}</div>
              <div class="gantt-day-row">${dayCells}</div>
            </div>
          </div>
        </div>
        <div class="gantt-right-body" id="ganttRightBody" data-range-start="${ganttIsoDate(start)}" data-range-end="${ganttIsoDate(end)}" data-day-width="${dayWidth}" data-day-count="${dayCount}">
          <table class="gantt-table gantt-right-table" style="--gantt-days:${dayCount};--gantt-day-width:${dayWidth}px;width:${dayCount*dayWidth}px">
            <tbody>${rightRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

function initGanttInteractions(){
  document.querySelectorAll('.gantt-bar').forEach(bar => {
    const taskId = bar.dataset.taskId;
    const leftHandle = bar.querySelector('.gantt-resize-handle.left');
    const rightHandle = bar.querySelector('.gantt-resize-handle.right');
    bar.onmousedown = e => {
      if (e.target.closest('.gantt-resize-handle, [data-gantt-hour-input]')) return;
      ganttBeginDrag(e, taskId, 'move', bar);
    };
    if (leftHandle) leftHandle.onmousedown = e => ganttBeginDrag(e, taskId, 'resize-left', bar);
    if (rightHandle) rightHandle.onmousedown = e => ganttBeginDrag(e, taskId, 'resize-right', bar);
  });
  const rightBody = document.getElementById('ganttRightBody');
  if (rightBody) {
    if (rightBody._ganttHourHandler) rightBody.removeEventListener('change', rightBody._ganttHourHandler);
    const onHourChange = e => {
      const input = e.target.closest('[data-gantt-hour-input]');
      if (!input) return;
      const taskId = input.dataset.taskId;
      const date = input.dataset.date;
      const kind = input.dataset.kind;
      const task = taskById(taskId);
      if (!task || !date) return;
      captureGanttScroll();
      syncTaskDailyHours(taskId, date, input.value, kind);
      saveDB();
      render();
      toast(kind === 'alloc' ? 'Allocated hours updated' : 'Actual hours updated');
    };
    rightBody._ganttHourHandler = onHourChange;
    rightBody.addEventListener('change', onHourChange);
  }
}

function ganttBeginDrag(evt, taskId, mode, barEl){
  evt.preventDefault();
  evt.stopPropagation();
  const bar = barEl || evt.currentTarget || evt.target.closest('.gantt-bar');
  const rightBody = document.getElementById('ganttRightBody');
  if(!bar || !rightBody) return;
  const task = taskById(taskId);
  if(!task) return;
  const rangeStart = parseGanttDate(rightBody.dataset.rangeStart);
  const dayWidth = +rightBody.dataset.dayWidth || state.ganttDayWidth || 48;
  const ol = parseFloat(bar.style.left) || 0;
  const ow = parseFloat(bar.style.width) || dayWidth;
  const sx = evt.clientX;
  ganttDrag = { task, bar, mode, rangeStart, dayWidth, sx, ol, ow, onMove:null, onUp:null };
  bar.classList.add('dragging');
  if(mode === 'resize-left') bar.classList.add('resizing-left');
  if(mode === 'resize-right') bar.classList.add('resizing-right');
  document.body.style.userSelect = 'none';
  const onMove = e => ganttUpdateDrag(e);
  const onUp = () => ganttEndDrag();
  ganttDrag.onMove = onMove;
  ganttDrag.onUp = onUp;
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function ganttUpdateDrag(evt){
  if(!ganttDrag) return;
  const {bar, mode, sx, ol, ow, dayWidth} = ganttDrag;
  const dx = evt.clientX - sx;
  if(mode === 'move'){
    bar.style.left = `${ol + dx}px`;
  }else if(mode === 'resize-right'){
    bar.style.width = `${Math.max(dayWidth, ow + dx)}px`;
  }else if(mode === 'resize-left'){
    if(ow - dx >= dayWidth){
      bar.style.left = `${ol + dx}px`;
      bar.style.width = `${ow - dx}px`;
    }
  }
}

function ganttEndDrag(){
  if(!ganttDrag) return;
  pushHistorySnapshot();
  document.removeEventListener('mousemove', ganttDrag.onMove);
  document.removeEventListener('mouseup', ganttDrag.onUp);
  const {task, bar, mode, rangeStart, dayWidth} = ganttDrag;
  bar.classList.remove('dragging','resizing-left','resizing-right');
  document.body.style.userSelect = '';
  const rawLeft = Math.max(0, parseFloat(bar.style.left) || 0);
  const rawWidth = Math.max(dayWidth, parseFloat(bar.style.width) || dayWidth);
  const snappedLeft = Math.max(0, Math.round(rawLeft / dayWidth) * dayWidth);
  const snappedWidth = Math.max(dayWidth, Math.round((rawWidth + 2) / dayWidth) * dayWidth - 2);
  const startDate = ganttAddDays(rangeStart, Math.round(snappedLeft / dayWidth));
  const spanDays = Math.max(1, Math.round((snappedWidth + 2) / dayWidth));
  const endDate = ganttAddDays(startDate, spanDays - 1);
  if(mode === 'move'){
    bar.style.left = `${snappedLeft}px`;
  }else if(mode === 'resize-left'){
    bar.style.left = `${snappedLeft}px`;
    bar.style.width = `${snappedWidth}px`;
  }else if(mode === 'resize-right'){
    bar.style.width = `${snappedWidth}px`;
  }
  task.startDate = ganttIsoDate(startDate);
  task.dueDate = ganttIsoDate(endDate);
  captureGanttScroll();
  saveDB();
  ganttDrag = null;
  render();
}

function wireTaskAllocationBuilder(form, task){
  if (!form) return;
  const root = form.querySelector('#task-allocation-root');
  if (!root) return;
  form.dataset.allocationEdited = normalizeTaskDailyAllocations(task?.dailyAllocations).length ? '1' : '0';
  form.dataset.allocationCleared = '0';
  form.dataset.allocationAutoFill = '0';
  const renderRoot = () => {
    const preserveCurrent = form.dataset.allocationEdited === '1';
    root.innerHTML = renderTaskAllocationBuilder(task, form, preserveCurrent);
  };
  if (!form._taskAllocationBound) {
    form.addEventListener('input', e => {
      if (e.target.matches('[name="allocatedHours"],[name="startDate"],[name="dueDate"]')) {
        form.dataset.allocationCleared = '0';
        form.dataset.allocationAutoFill = '0';
        renderRoot();
      }
      if (e.target.matches('[data-alloc-date]')) {
        form.dataset.allocationCleared = '0';
        form.dataset.allocationAutoFill = '0';
        form.dataset.allocationEdited = '1';
      }
    });
    form.addEventListener('change', e => {
      if (e.target.matches('[name="allocatedHours"],[name="startDate"],[name="dueDate"]')) {
        form.dataset.allocationCleared = '0';
        form.dataset.allocationAutoFill = '0';
        renderRoot();
      }
      if (e.target.matches('[data-alloc-date]')) {
        form.dataset.allocationCleared = '0';
        form.dataset.allocationAutoFill = '0';
        form.dataset.allocationEdited = '1';
        renderRoot();
      }
    });
    form.addEventListener('click', e => {
      const fill = e.target.closest('[data-action="task-allocation-fill"]');
      const clear = e.target.closest('[data-action="task-allocation-zero"]');
      if (!fill && !clear) return;
      e.preventDefault();
      if (fill) {
        form.dataset.allocationCleared = '0';
        form.dataset.allocationAutoFill = '1';
        form.dataset.allocationEdited = '0';
        renderRoot();
      } else {
        form.dataset.allocationCleared = '1';
        form.dataset.allocationAutoFill = '0';
        form.dataset.allocationEdited = '1';
        renderRoot();
      }
    });
    form._taskAllocationBound = true;
  }
  renderRoot();
}
function saveTask(e,id){
  e.preventDefault(); const f=e.target,g=n=>f.elements[n].value;
  const taskId=id||uid();
  const taskType=g('taskType')||'project';
  const startDate=g('startDate');
  const dueDate=g('dueDate');
  const allocatedHours=roundTaskHours(g('allocatedHours'));
  const projectIdRaw=g('projectId')||'';
  const projectStage=String(g('projectStage')||'').trim();
  const allocInputs = captureTaskAllocationInputs(f);
  const dailyAllocations = taskWorkdayRange(startDate, dueDate).map(date => ({date, hours: roundTaskHours(allocInputs.get(date) || 0)}));
  const allocationTotal = roundTaskHours(dailyAllocations.reduce((sum, entry) => sum + roundTaskHours(entry.hours), 0));
  const projectId = (taskType === 'internal' || taskType === 'leave') ? '' : projectIdRaw;
  const validStages = projectStageEntries(projectId).map(m => m.stageName);
  const normalizedStage = (taskType === 'internal' || taskType === 'leave' || !projectId || !projectStage || !validStages.includes(projectStage)) ? '' : projectStage;
  if (startDate && dueDate && allocatedHours > 0 && Math.abs(allocationTotal - allocatedHours) >= 0.01) {
    toast('Daily allocation must match the allocated hours.', true);
    return;
  }
  const name = String(g('name') || '').trim() || (taskType === 'allocation' ? 'Planned Allocation' : '');
  if (!name) {
    toast('Task name is required.', true);
    return;
  }
  if ((taskType === 'project' || taskType === 'allocation') && !projectId) {
    toast('Select a project for this task.', true);
    return;
  }
  pushHistorySnapshot();
  const data={taskType,projectId,projectStage:normalizedStage,name,assigneeId:g('assigneeId'),allocatedHours,actualHours:taskType==='allocation'?0:taskActualHours(taskId),startDate,dueDate,status:g('status'),priority:g('priority'),notes:g('notes'),dailyAllocations};
  if(id){Object.assign(taskById(id),data);toast('Task updated');}else{state.db.tasks.push({id:taskId,...data});toast('Task added');}
  saveDB();closeModal();render();
}

  pushHistorySnapshot();
  state.db.tasks=state.db.tasks.filter(x=>x.id!==id);

}

  if(id){Object.assign(personById(id),data);toast('Team member updated');}else{state.db.team.push({id:uid(),...data});toast('Team member added');}
  saveDB();closeModal();render();
}
function deleteTeam(id){
  const m=personById(id);
  const n=state.db.tasks.filter(t=>t.assigneeId===id).length;
  if(!confirm(`Delete "${m.name}"?${n?` They have ${n} assigned task(s) — those will become unassigned.`:''}`)) return;
  pushHistorySnapshot();
  state.db.tasks.forEach(t=>{if(t.assigneeId===id) t.assigneeId=''});
  state.db.timesheet=state.db.timesheet.filter(x=>x.personId!==id);
  state.db.team=state.db.team.filter(x=>x.id!==id);
  saveDB();render();toast('Team member deleted');
}

// TIMESHEET CRUD
function openTimesheetModal(id){
  const ts=id?state.db.timesheet.find(x=>x.id===id):{dayDate:todayISO(),weekEnding:ganttIsoDate(weekEndFriday(parseGanttDate(todayISO()))),personId:state.db.team[0]?.id||'',projectId:state.db.projects[0]?.id||'',taskId:'',hoursLogged:0,billable:'Y',notes:''};
  const projOpts=['<option value="">— Internal / no project —</option>'].concat(state.db.projects.map(p=>`<option value="${p.id}" ${ts.projectId===p.id?'selected':''}>${esc(p.shortName)}</option>`)).join('');
  const perOpts=state.db.team.map(m=>`<option value="${m.id}" ${ts.personId===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  const taskOpts=state.db.tasks.slice().sort((a,b)=>((a.taskType||'project')+(a.name||'')).localeCompare((b.taskType||'project')+(b.name||''))).filter(t=>String(t.taskType||'')!=='allocation').map(t=>{
    const proj=projectById(t.projectId);
    const label=`${taskTypeLabel(t)} - ${t.name}${taskProjectStage(t) ? ` - ${taskProjectStageLabel(t)}` : ''}${proj?.shortName ? ` - ${proj.shortName}` : ''}`;
    return `<option value="${t.id}" ${ts.taskId===t.id?'selected':''}>${esc(label)}</option>`;
  }).join('');
  openModal(`<h3>${id?'Edit':'Log'} Hours</h3><form onsubmit="saveTimesheet(event,'${id||''}');return false">
    <div class="form-row"><div class="form-group"><label>Work Date *</label><input required type="date" name="dayDate" value="${esc(ts.dayDate||ts.weekEnding)}" oninput="this.form.elements.weekEnding.value = this.value ? ganttIsoDate(weekEndFriday(parseGanttDate(this.value))) : ''"></div><div class="form-group"><label>Week Ending</label><input type="date" name="weekEnding" value="${esc(ts.weekEnding)}" readonly></div></div>
    <div class="form-row"><div class="form-group"><label>Person *</label><select required name="personId">${perOpts}</select></div><div class="form-group"><label>Project</label><select name="projectId" onchange="updateTaskOptions(this)">${projOpts}</select></div></div>
    <div class="form-row"><div class="form-group"><label>Task</label><select name="taskId" id="tsTaskSelect"><option value="">&mdash;</option>${taskOpts}</select></div><div class="form-group"><label>&nbsp;</label><input type="text" value="This date will link the log to the timeline" readonly></div></div>
    <div class="form-row"><div class="form-group"><label>Hours *</label><input required type="number" name="hoursLogged" value="${ts.hoursLogged||0}" min="0" step="0.25"></div><div class="form-group"><label>Billable</label><select name="billable"><option value="Y" ${ts.billable==='Y'?'selected':''}>Yes</option><option value="N" ${ts.billable==='N'?'selected':''}>No</option></select></div></div>
    <div class="form-group"><label>Notes</label><textarea name="notes">${esc(ts.notes)}</textarea></div>
    <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form>`);
  setTimeout(()=>{
    const projectSelect = document.querySelector('[name=projectId]');
    if (projectSelect) updateTaskOptions(projectSelect);
  },0);
}
function updateTaskOptions(sel){
  if(!sel) return;
  const pid=sel.value;
  const opts=['<option value="">&mdash;</option>'].concat(state.db.tasks.filter(t=>String(t.taskType||'')!=='allocation' && (!pid || t.projectId===pid || !isProjectTask(t))).map(t=>{
    const proj=projectById(t.projectId);
    const label=`${taskTypeLabel(t)} - ${t.name}${taskProjectStage(t) ? ` - ${taskProjectStageLabel(t)}` : ''}${proj?.shortName ? ` - ${proj.shortName}` : ''}`;
    return `<option value="${t.id}">${esc(label)}</option>`;
  })).join('');
  const target=document.getElementById('tsTaskSelect');
  if(target) target.innerHTML=opts;
}
function saveTimesheet(e,id){
  e.preventDefault(); const f=e.target,g=n=>f.elements[n].value;
  pushHistorySnapshot();
  const taskId=g('taskId');
  const task=taskById(taskId);
  const previous = id ? state.db.timesheet.find(x=>x.id===id) : null;
  const dayDate=g('dayDate') || g('weekEnding');
  const weekEnding=dayDate ? ganttIsoDate(weekEndFriday(parseGanttDate(dayDate))) : g('weekEnding');
  const data={dayDate,weekEnding,personId:g('personId'),projectId:g('projectId')||task?.projectId||'',taskId,hoursLogged:+g('hoursLogged')||0,billable:g('billable'),notes:g('notes')};
  if(id){Object.assign(state.db.timesheet.find(x=>x.id===id),data);toast('Task Log updated');}else{state.db.timesheet.push({id:uid(),...data});toast('Hours logged');}
  if (previous?.taskId && previous.taskId !== taskId) {
    const oldTask = taskById(previous.taskId);
    if (oldTask) oldTask.actualHours = taskActualHours(oldTask.id);
  }
  if (task && String(task.taskType || '') !== 'allocation') task.actualHours = taskActualHours(task.id);
  saveDB();closeModal();render();
}
function deleteTimesheet(id){
  if(!confirm('Delete this task log entry?')) return;
  pushHistorySnapshot();
  const entry = state.db.timesheet.find(x=>x.id===id);
  state.db.timesheet=state.db.timesheet.filter(x=>x.id!==id);
  const task = entry?.taskId ? taskById(entry.taskId) : null;
  if (task && String(task.taskType || '') !== 'allocation') task.actualHours = taskActualHours(task.id);
  saveDB();render();toast('Entry deleted');
}

// NOTES CRUD
function openNoteModal(id){
  const n=id?state.db.notes.find(x=>x.id===id):{dateCreated:todayISO(),ownerId:state.db.team[0]?.id||'',category:'Reminder',subject:'',details:'',followUpDate:'',status:'Open',priority:'Medium'};
  const own=state.db.team.map(m=>`<option value="${m.id}" ${n.ownerId===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  const cats=['Reminder','Note','Action Item','Risk'].map(c=>`<option value="${c}" ${n.category===c?'selected':''}>${c}</option>`).join('');
  const sts=['Open','In Progress','Closed'].map(c=>`<option value="${c}" ${n.status===c?'selected':''}>${c}</option>`).join('');
  const prs=['High','Medium','Low'].map(c=>`<option value="${c}" ${n.priority===c?'selected':''}>${c}</option>`).join('');
  openModal(`<h3>${id?'Edit':'Add'} Note</h3><form onsubmit="saveNote(event,'${id||''}');return false">
    <div class="form-row"><div class="form-group"><label>Owner *</label><select required name="ownerId">${own}</select></div><div class="form-group"><label>Category</label><select name="category">${cats}</select></div></div>
    <div class="form-group"><label>Subject *</label><input required name="subject" value="${esc(n.subject)}"></div>
    <div class="form-group"><label>Details</label><textarea name="details">${esc(n.details)}</textarea></div>
    <div class="form-row-3"><div class="form-group"><label>Follow-up</label><input type="date" name="followUpDate" value="${esc(n.followUpDate)}"></div><div class="form-group"><label>Status</label><select name="status">${sts}</select></div><div class="form-group"><label>Priority</label><select name="priority">${prs}</select></div></div>
    <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form>`);
}
function saveNote(e,id){
  e.preventDefault(); const f=e.target,g=n=>f.elements[n].value;
  pushHistorySnapshot();
  const data={ownerId:g('ownerId'),category:g('category'),subject:g('subject'),details:g('details'),followUpDate:g('followUpDate'),status:g('status'),priority:g('priority')};
  if(id){Object.assign(state.db.notes.find(x=>x.id===id),data);toast('Note updated');}else{state.db.notes.push({id:uid(),dateCreated:todayISO(),...data});toast('Note added');}
  saveDB();closeModal();render();
}
function deleteNote(id){
  if(!confirm('Delete this note?')) return;
  pushHistorySnapshot();
  state.db.notes=state.db.notes.filter(x=>x.id!==id);
  saveDB();render();toast('Note deleted');
}

// SETTINGS
function openSettingsModal(){
  const s=state.db.settings;
  openModal(`<h3>Settings</h3><form onsubmit="saveSettings(event);return false">
    <div class="form-row-3"><div class="form-group"><label>Default Rate</label><input required type="number" name="blendedRate" value="${s.blendedRate}" min="0"></div><div class="form-group"><label>Currency</label><input required name="currency" value="${esc(s.currency)}" maxlength="4"></div><div class="form-group"><label>Weeks in Period</label><input required type="number" name="weeksInPeriod" value="${s.weeksInPeriod}" min="1" max="52"></div></div>
        <p style="font-size:12px;color:var(--muted);margin-top:8px">Used as a fallback when a team member does not have a rate.</p>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)"><button type="button" class="btn btn-danger" onclick="resetToSeed()">Reset to Sample Data</button><span style="font-size:11px;color:var(--muted);margin-left:8px">Erases all data.</span></div>
    <div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form>`);
}
function saveSettings(e){
  e.preventDefault(); const f=e.target,g=n=>f.elements[n].value;
  pushHistorySnapshot();
  state.db.settings={blendedRate:+g('blendedRate')||350,currency:g('currency')||'AED',weeksInPeriod:+g('weeksInPeriod')||4};
  saveDB();closeModal();render();toast('Settings saved');
}
function resetToSeed(){
  if(!confirm('This will DELETE all your data and restore sample data. Continue?')) return;
  pushHistorySnapshot();
  localStorage.removeItem(DB_KEY);
  if(typeof window.__DB__!=='undefined') window.__DB__=null;
  state.db=defaultDB();
  localStorage.setItem(DB_KEY,JSON.stringify(state.db));
  state.source='seed';
  closeModal();render();updateDirtyIndicator();toast('Reset to sample data');
}

// EXPORT / IMPORT
function exportExcel(){
  const db=state.db; const wb=XLSX.utils.book_new();
  const projSheet=[['Code','Short Name','Full Name','Client','PM','Lead','Certifications','Start','End','Alloc Hrs','Actual Hrs','Alloc Budget','Actual Budget','% Used','Status','Notes']];
  db.projects.forEach(p=>{const t=projectTotals(p.id);const lead=personById(p.sustainabilityLead);projSheet.push([p.code,p.shortName,p.name,p.client,p.pm,lead?.name||'',projectCertificationSummary(p),p.startDate,p.endDate,t.allocHrs,t.actualHrs,t.allocBudget,t.actualBudget,t.allocBudget?(t.actualBudget/t.allocBudget):0,p.status,p.notes||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(projSheet),'Projects');
  const mileSheet=[['Project Code','Project','Stage','Submission %','Kick-off Date','Submission Date','Status','Owner','Notes']];
  db.milestones.slice().sort((a,b)=>(a.kickoffDate||'').localeCompare(b.kickoffDate||'')||(a.submissionDate||'').localeCompare(b.submissionDate||'')||(a.stageName||'').localeCompare(b.stageName||'')||(a.submissionLabel||'').localeCompare(b.submissionLabel||'')).forEach(m=>{const p=projectById(m.projectId),o=personById(m.ownerId);mileSheet.push([p?.code||'',p?.shortName||'',m.stageName,m.submissionLabel,m.kickoffDate,m.submissionDate,m.status,o?.name||'',m.notes||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mileSheet),'Milestones');
  const taskSheet=[['Project Code','Project','Project Stage','Task','Assignee','Alloc Hrs','Actual Hrs','Alloc Budget','Actual Budget','Start','Due','Status','Priority','% Used','Notes']];
  db.tasks.forEach((t)=>{const p=projectById(t.projectId),m=personById(t.assigneeId);const a=+t.allocatedHours||0,ac=String(t.taskType||'')==='allocation'?0:taskActualHours(t);taskSheet.push([p?.code||'',p?.shortName||'',taskProjectStageLabel(t),t.name,m?.name||'',a,ac,taskBudget(t,'allocatedHours'),String(t.taskType||'')==='allocation'?'':taskBudget(t,'actualHours'),t.startDate,t.dueDate,t.status,t.priority,a?ac/a:0,t.notes||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(taskSheet),'Tasks');
  const teamSheet=[['Name','Role','Email','Hourly Rate','Weekly Cap','Period Cap','Alloc','Actual','Skills','Notes']];
  db.team.forEach(m=>{const tot=personTotals(m.id);teamSheet.push([m.name,m.role,m.email,personRate(m.id),m.weeklyCapacity,(m.weeklyCapacity||40)*db.settings.weeksInPeriod,tot.allocHrs,tot.actualHrs,m.skills||'',m.notes||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(teamSheet),'Team');
  const tsSheet=[['Date','Week Ending','Person','Project Code','Task','Hours','Billable','Notes']];
  db.timesheet.forEach(x=>{const p=projectById(x.projectId),m=personById(x.personId),t=taskById(x.taskId);tsSheet.push([x.dayDate||x.weekEnding||'',x.weekEnding,m?.name||'',p?.code||'',t?.name||'',x.hoursLogged,x.billable,x.notes||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(tsSheet),'Task Log');
  const nSheet=[['Created','Owner','Category','Subject','Details','Follow-up','Status','Priority']];
  db.notes.forEach(n=>{const own=personById(n.ownerId);nSheet.push([n.dateCreated,own?.name||'',n.category,n.subject,n.details,n.followUpDate,n.status,n.priority]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(nSheet),'Notes');
  const d=new Date();const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  XLSX.writeFile(wb,`GHD_Sustainability_Planner_${stamp}.xlsx`); toast('Excel exported');
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state.db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const d=new Date();const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.href=url; a.download=`ghd_planner_backup_${stamp}.json`; a.click(); URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function importJSON(evt){
  const file=evt.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result); if(!d.projects||!d.tasks||!d.team) throw new Error('Invalid backup'); if(!confirm('OVERWRITE all current data?')) return; pushHistorySnapshot(); state.db=normalizeDB(d); saveDB(); render(); toast('Data imported');}catch(e){toast('Import failed: '+e.message,true);}};
  r.readAsText(file); evt.target.value='';
}

// EVENT WIRING
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('click',()=>{pushHistorySnapshot();state.currentView=item.dataset.view;document.getElementById('sidebar').classList.remove('open');render();});
  });
  document.getElementById('modal-overlay').addEventListener('click',e=>{e.stopPropagation();});
  document.addEventListener('keydown',e=>{
    const activeModal = document.getElementById('modal-overlay').classList.contains('active');
    const target = e.target;
    const editable = !!target && (target.isContentEditable || ['INPUT','TEXTAREA'].includes(target.tagName));
    const key = String(e.key || '').toLowerCase();
    const wantsUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && key === 'z';
    const wantsRedo = (e.ctrlKey || e.metaKey) && (key === 'y' || (e.shiftKey && key === 'z'));
    if (key === 'escape' && activeModal) {
      e.preventDefault();
      return;
    }
    if ((wantsUndo || wantsRedo) && !editable) {
      e.preventDefault();
      if (wantsUndo) undoAppChange();
      else redoAppChange();
    }
  });
  document.getElementById('hamburgerBtn').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');});
  loadUIState();
  (async () => {
    const linked = await ensureLinkedFileHandle();
    updateDirtyIndicator();
    if (linked && state.db) {
      render();
      return;
    }
    showStartupDatabasePrompt();
  })();
});
</script>
