<style>
:root{--dark:#1F4E3C;--accent:#4C8B6B;--tint:#E8F1EC;--charcoal:#2B2B2B;--bg:#F5F7F5;--card:#FFFFFF;--red:#E06666;--amber:#E8B84A;--green:#7BB77B;--border:#E1E5E1;--muted:#8A8F8A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--charcoal);font-size:13px;line-height:1.4}
a{color:var(--dark);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.top-nav{position:fixed;top:0;left:0;right:0;height:60px;background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.brand{color:#fff;font-weight:700;font-size:17px;letter-spacing:0.3px}
.top-actions{display:flex;gap:8px;align-items:center}
.top-actions .btn{padding:6px 12px;font-size:12px}
.sidebar{position:fixed;top:60px;left:0;bottom:0;width:220px;background:#fff;border-right:1px solid var(--border);padding:14px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--charcoal);font-weight:500;font-size:13px;border-left:3px solid transparent;transition:all .15s;cursor:pointer}
.nav-item:hover{background:var(--tint)}
.nav-item.active{background:var(--dark);color:#fff;border-left-color:var(--amber)}
.main{margin-left:220px;margin-top:60px;padding:24px;min-height:calc(100vh - 60px)}
.view-title{color:var(--dark);font-size:22px;font-weight:700;margin-bottom:4px}
.view-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:600;border-radius:6px;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--dark);color:#fff}
.btn-primary:hover{background:#163a2c}
.btn-secondary{background:#fff;color:var(--dark);border-color:var(--dark)}
.btn-secondary:hover{background:var(--tint)}
.btn-outline-light{background:transparent;color:#fff;border-color:rgba(255,255,255,0.4)}
.btn-outline-light:hover{background:rgba(255,255,255,0.1)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c94f4f}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-icon{padding:5px 8px;background:transparent;color:var(--dark);font-size:14px;border-radius:4px}
.btn-icon:hover{background:var(--tint)}
.btn-icon.danger{color:var(--red)}
.btn-icon.danger:hover{background:#fce4e4}
.card{background:var(--card);border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px}
.card h2{color:var(--dark);font-size:14px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid var(--accent);display:flex;flex-direction:column;gap:6px}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600}
.kpi-value{font-size:32px;font-weight:700;color:var(--dark);line-height:1.1}
.util-chart-shell{display:flex;flex-direction:column;gap:12px}
.util-chart-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:4px}
.util-chart-note{color:var(--muted);font-size:12px}
.util-legend{display:flex;flex-wrap:wrap;gap:10px 14px}
.util-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--charcoal);font-weight:600;white-space:nowrap}
.util-legend-btn{padding:0;border:none;background:none;cursor:pointer}
.util-legend-btn:hover{opacity:0.9}
.util-legend-btn.active{color:var(--dark)}
.util-legend-reset{font-size:11px;color:var(--accent);font-weight:700;margin-left:4px}
.util-legend-swatch{width:12px;height:12px;border-radius:999px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.35)}
.util-legend-swatch.over100{animation:utilLegendPulse 0.8s ease-in-out infinite;box-shadow:0 0 0 1px rgba(255,255,255,0.9), 0 0 8px rgba(217,75,75,0.65), 0 0 16px rgba(217,75,75,0.4)}

}

</style>

  <div style="display:flex;align-items:center;gap:12px">

  </div>
  <div class="top-actions">
    <button class="btn btn-outline-light" id="saveBtn" onclick="saveToFile()" title="Save to src/database.json">Save<span id="dirtyDot" style="display:none;color:#FFD54F;margin-left:4px">●</span></button>
    <button class="btn btn-outline-light" onclick="reloadFromFile()" title="Reload from src/database.json">Reload</button>

  <a class="nav-item" data-view="gantt">Timeline</a>
  <a class="nav-item" data-view="tasks">Tasks</a>
  <a class="nav-item" data-view="timesheet">Task Log</a>
  <a class="nav-item" data-view="projects">Projects</a>
  <a class="nav-item" data-view="team">Team</a>
  <a class="nav-item" data-view="notes">Notes &amp; Reminders</a>
</aside>

<main class="main" id="app-content"></main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// =====================================================
// DATA LAYER
// =====================================================
const DB_KEY = 'ghd_planner_db';
const FILE_HANDLE_DB = 'ghd_planner_file_handle';
const FILE_HANDLE_STORE = 'handles';
const FILE_HANDLE_KEY = 'database-json';
const SAVE_FILE_PATH = 'C:\\Users\\linnh\\Documents\\AAA\\Sustainability Planner\\src\\database.json';
const uid = () => Math.random().toString(36).slice(2,10);
const todayISO = () => new Date().toISOString().slice(0,10);

let state = {db:null, currentView:'dashboard', filters:{}, chartFocus:{team:'',project:''}, collapsed:new Set(), taskExpanded:new Set(), projectExpanded:new Set(), dirty:false, source:'seed', ganttDayWidth:48, ganttScroll:{top:0,left:0}};
let ganttDrag = null;
let fileHandle = null;
let lastFileModified = null;
let pollTimer = null;
let pendingSaveLinkResolve = null;
let databaseReady = false;
const HISTORY_LIMIT = 50;
const historyState = {undo:[], redo:[], lock:false};
const CERTIFICATION_OPTIONS = [
  {value:'estidama', label:'Estidama'},
  {value:'leed', label:'LEED'},
  {value:'fitwel', label:'Fitwel'},
  {value:'well', label:'WELL'},
];
const CERTIFICATION_STATUS_OPTIONS = ['Planned','Pursuing','Submitted','Certified','On Hold'];

function certificationLabel(standard){
  const found = CERTIFICATION_OPTIONS.find(x => x.value === standard);
  return found ? found.label : '';
}

function normalizeProjectCertification(cert){
  const standard = cert?.standard || '';
  const label = (cert?.label || cert?.name || certificationLabel(standard)).trim() || certificationLabel(standard);
  return {
    id: cert?.id || uid(),
    standard,
    label,
    target: cert?.target || '',
    status: cert?.status || 'Pursuing',
    leadId: cert?.leadId || '',
    notes: cert?.notes || '',
  };
}

function normalizeProjectCertifications(list){
  return Array.isArray(list) ? list.map(normalizeProjectCertification) : [];
}

function projectCertificationSummary(project){
  const certs = normalizeProjectCertifications(project?.certifications);
  return certs.map(cert => {
    const target = cert.target ? ` · ${cert.target}` : '';
    return `${cert.label}${target}`;
  }).join(' | ');
}

function scorecardPathForStandard(standard){
  const map = {
    estidama: 'src/scorecard-estidama.html',
    leed: 'src/scorecard-leed.html',
    fitwel: 'src/scorecard-fitwel.html',
    well: 'src/scorecard-well.html',
  };
  return map[standard] || '';
}

function openCertificationScorecard(projectId, certId, standard){
  const path = scorecardPathForStandard(standard);
  if (!path) return;
  const url = new URL(path, window.location.href);
  if (projectId) url.searchParams.set('projectId', projectId);
  if (certId) url.searchParams.set('certId', certId);
  if (standard) url.searchParams.set('standard', standard);
  closeModal();
  window.location.href = url.toString();
}

function projectCertificationPills(project){
  const certs = normalizeProjectCertifications(project?.certifications);
  if (!certs.length) return '<div class="project-cert-muted">No certifications added</div>';
  return certs.map(cert => {
    const cls = (cert.standard || 'cert').toLowerCase();
    const lead = personById(cert.leadId);
    const title = [cert.label, cert.target, cert.status, lead?.name].filter(Boolean).join(' • ');
    const onclick = ` onclick="openCertificationScorecard('${esc(project?.id || '')}','${esc(cert.id)}','${esc(cert.standard || '')}')"`; 
    const role = ' role="button" tabindex="0"';
    const display = esc(certificationLabel(cert.standard) || cert.label || cert.standard || '');
    return `<span class="project-cert-pill project-cert-pill-link ${esc(cls)}" title="${esc(title)}"${onclick}${role}>${display}</span>`;
  }).join('');
}

function renderProjectCertificationRows(certs, teamMembers){
  const rows = Array.isArray(certs) ? certs : [];
  const teamOpts = ['<option value="">—</option>'].concat((teamMembers || []).map(m => `<option value="${m.id}">${esc(m.name)}</option>`)).join('');
  const statusOpts = CERTIFICATION_STATUS_OPTIONS.map(s => `<option value="${s}">${s}</option>`).join('');
  const standardOpts = ['<option value="">Choose...</option>'].concat(CERTIFICATION_OPTIONS.map(opt => `<option value="${opt.value}">${opt.label}</option>`)).join('');
  if (!rows.length) {
    return `<div class="cert-empty">No certifications added yet. Add one row for each standard the project is pursuing.</div>`;
  }
  return rows.map(cert => {
    const isBlank = !(cert?.standard || cert?.label || cert?.target || cert?.status || cert?.leadId);
    const row = isBlank ? {id: cert?.id || uid(), standard:'', label:'', target:'', status:'Pursuing', leadId:'', notes:''} : normalizeProjectCertification(cert);
    return `<div class="cert-row" data-cert-row data-cert-id="${esc(row.id)}">
      <select data-cert-field="standard">${standardOpts.replace(`value="${esc(row.standard)}"`, `value="${esc(row.standard)}" selected`)}</select>
      <input data-cert-field="label" value="${esc(row.label)}" placeholder="Certification label">
      <input data-cert-field="target" value="${esc(row.target)}" placeholder="Target">
      <select data-cert-field="status">${statusOpts.replace(`value="${esc(row.status)}"`, `value="${esc(row.status)}" selected`)}</select>
      <select data-cert-field="leadId">${teamOpts.replace(`value="${esc(row.leadId)}"`, `value="${esc(row.leadId)}" selected`)}</select>
      <button type="button" class="btn-icon danger cert-remove" title="Remove certification" onclick="removeProjectCertificationRow(this)">×</button>
    </div>`;
  }).join('');
}

function getProjectCertificationForm(){
  return document.querySelector('#modal-content form');
}

function getProjectCertificationRoot(){
  return document.getElementById('project-certifications-root');
}

function addProjectCertificationRow(initial = {}){
  const root = getProjectCertificationRoot();
  if (!root) return;
  const form = getProjectCertificationForm();
  const teamMembers = state.db?.team || [];
  const html = renderProjectCertificationRows([{id: initial.id || uid(), standard: initial.standard || '', label: initial.label || '', target: initial.target || '', status: initial.status || 'Pursuing', leadId: initial.leadId || '', notes: initial.notes || ''}], teamMembers);
  if (root.querySelector('.cert-empty')) {
    root.innerHTML = html;
  } else {
    root.insertAdjacentHTML('beforeend', html);
  }
  if (form) form.dataset.certificationsTouched = '1';
}

function removeProjectCertificationRow(btn){
  const row = btn?.closest('[data-cert-row]');
  if (!row) return;
  const root = row.parentElement;
  row.remove();
  if (root && !root.querySelector('[data-cert-row]')) {
    root.innerHTML = '<div class="cert-empty">No certifications added yet. Add one row for each standard the project is pursuing.</div>';
  }
  const form = getProjectCertificationForm();
  if (form) form.dataset.certificationsTouched = '1';
}

function collectProjectCertifications(form){
  const rows = [...form.querySelectorAll('[data-cert-row]')];
  return rows.map(row => {
    const get = field => row.querySelector(`[data-cert-field="${field}"]`)?.value?.trim() || '';
    if (!(get('standard') || get('label') || get('target') || get('leadId') || get('notes'))) return null;
    const standard = get('standard') || '';
    const label = get('label') || certificationLabel(standard);
    return normalizeProjectCertification({
      id: row.dataset.certId || uid(),
      standard,
      label,
      target: get('target'),
      status: get('status') || 'Pursuing',
      leadId: get('leadId'),
      notes: '',
    });
  }).filter(Boolean);
}

// Certification UI v2: drag cards into the project.
function normalizeProjectCertification(cert){
  const standard = cert?.standard || '';
  const label = (cert?.label || cert?.name || certificationLabel(standard)).trim() || certificationLabel(standard);
  return { id: cert?.id || uid(), standard, label };
}

function normalizeProjectCertifications(list){
  return Array.isArray(list) ? list.map(normalizeProjectCertification) : [];
}

function projectCertificationSummary(project){
  const certs = normalizeProjectCertifications(project?.certifications);
  return certs.map(cert => cert.label).join(' | ');
}

function projectCertificationPills(project){
  const certs = normalizeProjectCertifications(project?.certifications);
  if (!certs.length) return '<div class="project-cert-muted">No certifications added</div>';
  return certs.map(cert => {
    const cls = (cert.standard || 'cert').toLowerCase();
    const lead = personById(cert.leadId);
    const title = [cert.label, cert.target, cert.status, lead?.name].filter(Boolean).join(' • ');
    const onclick = ` onclick="openCertificationScorecard('${esc(project?.id || '')}','${esc(cert.id)}','${esc(cert.standard || '')}')"`; 
    const role = ' role="button" tabindex="0"';
    const display = esc(certificationLabel(cert.standard) || cert.standard || cert.label || '');
    return `<span class="project-cert-pill project-cert-pill-link ${esc(cls)}" title="${esc(title)}"${onclick}${role}>${display}</span>`;
  }).join('');
}

function getProjectCertificationForm(){
  return document.querySelector('#modal-content form');
}

function getProjectCertificationRoot(){
  return document.getElementById('project-certifications-root');
}

function renderCertificationPalette(project){
  const selected = new Set(normalizeProjectCertifications(project?.certifications).map(c => c.standard));
  return CERTIFICATION_OPTIONS.map(opt => {
    const disabled = selected.has(opt.value);
    return `<div class="cert-card${disabled ? ' disabled' : ''}" draggable="${disabled ? 'false' : 'true'}" data-cert-standard="${esc(opt.value)}" ondragstart="dragCertificationCard(event)" onclick="addCertificationFromCard('${opt.value}')">
      <div class="cert-card-label">${esc(opt.label)}</div>
      <div class="cert-card-sub">${disabled ? 'Already added' : 'Drag into project'}</div>
    </div>`;
  }).join('');
}

function getProjectCertificationProjectId(){
  const form = getProjectCertificationForm();
  return form?.dataset?.projectId || '';
}

function renderSelectedCertificationCards(certs, projectId = ''){
  const rows = normalizeProjectCertifications(certs);
  if (!rows.length) return `<div class="cert-empty">Drop certification cards here</div>`;
  return rows.map(cert => {
    const opt = CERTIFICATION_OPTIONS.find(x => x.value === cert.standard);
    const launch = ` onclick="openCertificationScorecard('${esc(projectId)}','${esc(cert.id)}','${esc(cert.standard || '')}')"`; 
    const role = ' role="button" tabindex="0"';
    return `<div class="cert-card selected cert-card-link ${(cert.standard || 'cert').toLowerCase()}" data-cert-row data-cert-id="${esc(cert.id)}" data-cert-standard="${esc(cert.standard)}"${launch}${role}>
      <div class="cert-card-label">${esc((opt?.label || cert.label || '').toUpperCase())}</div>
      <button type="button" class="btn btn-danger" onclick="event.stopPropagation();removeProjectCertificationRow(this)">Remove</button>
    </div>`;
  }).join('');
}

function getSelectedCertificationStandards(){
  const root = getProjectCertificationRoot();
  if (!root) return new Set();
  return new Set([...root.querySelectorAll('[data-cert-row]')].map(el => el.dataset.certStandard).filter(Boolean));
}

function syncCertificationPalette(){
  const palette = document.getElementById('project-certification-palette');
  if (!palette) return;
  const selected = getSelectedCertificationStandards();
  palette.innerHTML = CERTIFICATION_OPTIONS.map(opt => {
    const disabled = selected.has(opt.value);
    return `<div class="cert-card${disabled ? ' disabled' : ''}" draggable="${disabled ? 'false' : 'true'}" data-cert-standard="${esc(opt.value)}" ondragstart="dragCertificationCard(event)" onclick="addCertificationFromCard('${opt.value}')">
      <div class="cert-card-label">${esc(opt.label)}</div>
      <div class="cert-card-sub">${disabled ? 'Already added' : 'Drag into project'}</div>
    </div>`;
  }).join('');

function dragCertificationCard(evt){
  const standard = evt.currentTarget?.dataset?.certStandard;
  if (!standard) return;
  evt.dataTransfer.effectAllowed = 'copy';
  evt.dataTransfer.setData('text/plain', standard);
}

function allowCertificationDrop(evt){
  evt.preventDefault();
  evt.dataTransfer.dropEffect = 'copy';
}

function addCertificationFromCard(standard){
  const root = getProjectCertificationRoot();
  if (!root) return;
  if ([...root.querySelectorAll('[data-cert-standard]')].some(el => el.dataset.certStandard === standard)) return;
  const opt = CERTIFICATION_OPTIONS.find(x => x.value === standard);
  if (!opt) return;
  const cardHtml = renderSelectedCertificationCards([{id: uid(), standard, label: opt.label}], getProjectCertificationProjectId());
  if (root.querySelector('.cert-empty')) root.innerHTML = cardHtml;
  else root.insertAdjacentHTML('beforeend', cardHtml);
  syncCertificationPalette();
  const form = getProjectCertificationForm();
  if (form) form.dataset.certificationsTouched = '1';
}

function handleCertificationDrop(evt){
  evt.preventDefault();
  const standard = evt.dataTransfer.getData('text/plain');
  if (standard) addCertificationFromCard(standard);
}

function removeProjectCertificationRow(btn){
  const card = btn?.closest('[data-cert-row]');
  if (!card) return;
  const root = card.parentElement;
  card.remove();
  if (root && !root.querySelector('[data-cert-row]')) {
    root.innerHTML = '<div class="cert-empty">Drop certification cards here</div>';
  }
  syncCertificationPalette();
  const form = getProjectCertificationForm();
  if (form) form.dataset.certificationsTouched = '1';
}

function collectProjectCertifications(form){
  const rows = [...form.querySelectorAll('[data-cert-row]')];
  return rows.map(row => {
    const standard = row.dataset.certStandard || '';
    if (!standard) return null;
    const opt = CERTIFICATION_OPTIONS.find(x => x.value === standard);
    return normalizeProjectCertification({ id: row.dataset.certId || uid(), standard, label: opt?.label || certificationLabel(standard) });
  }).filter(Boolean);
}

function defaultHourlyRateForMember(member={}){
  const role = String(member.role || '').toLowerCase();
  if (role.includes('lead')) return 450;
  if (role.includes('consultant')) return 350;
  if (role.includes('computational')) return 300;
  return state?.db?.settings?.blendedRate || 350;
}

function normalizeDB(db){
  if (!db || typeof db !== 'object') return db;
  db.settings ||= {blendedRate:350,currency:'AED',weeksInPeriod:4};
  db.team = Array.isArray(db.team) ? db.team : [];
  db.team.forEach(m => {
    m.hourlyRate = +m.hourlyRate || defaultHourlyRateForMember(m);
  });
  db.projects = Array.isArray(db.projects) ? db.projects : [];
  db.projects.forEach(p => {
    p.ncr = normalizeNcrValue(p.ncr);
    const lead = db.team.find(m => m.id === p.sustainabilityLead);
    const leadRate = +lead?.hourlyRate || (db.settings?.blendedRate || 350);
    const legacyBudget = (+p.allocatedHours || 0) * leadRate * (p.ncr / 100);
    p.allocatedBudget = +p.allocatedBudget || legacyBudget || 0;
    p.certifications = normalizeProjectCertifications(p.certifications);
  });
  db.milestones = Array.isArray(db.milestones) ? db.milestones : [];
  db.milestones.forEach(m => {
    m.projectId = m.projectId || '';
    m.stageName = m.stageName || '';
    m.submissionLabel = m.submissionLabel || '';
    m.kickoffDate = m.kickoffDate || m.plannedDate || '';
    m.submissionDate = m.submissionDate || m.actualDate || '';
    m.status = m.status || 'Planned';
    m.ownerId = m.ownerId || '';
    m.notes = m.notes || '';
    delete m.plannedDate;
    delete m.actualDate;
  });
  db.tasks = Array.isArray(db.tasks) ? db.tasks : [];
  db.tasks.forEach(t => {
    t.taskType = t.taskType || (t.projectId ? 'project' : 'internal');
    if (t.taskType !== 'project') t.projectId = t.projectId || '';
    t.projectStage = t.projectStage || t.stageName || t.stage || '';
    t.allocatedHours = +t.allocatedHours || 0;
    t.actualHours = +t.actualHours || 0;
    t.dailyAllocations = normalizeTaskDailyAllocations(t.dailyAllocations);
  });
  db.timesheet = Array.isArray(db.timesheet) ? db.timesheet : [];
  db.timesheet.forEach(x => {
    x.dayDate = x.dayDate || x.weekEnding || '';
    if (!x.weekEnding && x.dayDate) {
      const d = parseGanttDate(x.dayDate);
      x.weekEnding = d ? ganttIsoDate(weekEndFriday(d)) : '';
    }
  });
  db.notes = Array.isArray(db.notes) ? db.notes : [];
  return db;
}

function parseDatabaseText(text){
  const result = JSON.parse(text);
  if (!result || typeof result !== 'object') throw new Error('Could not parse JSON database file');
  return normalizeDB(JSON.parse(JSON.stringify(result)));
}

async function loadDatabaseFromHandle(handle){
  const file = await handle.getFile();
  const text = await file.text();
  const data = parseDatabaseText(text);
  state.db = data;
  state.source = 'file';
  fileHandle = handle;
  lastFileModified = file.lastModified;
  databaseReady = true;
  state.dirty = false;
  resetHistory();
  storeFileHandle(handle).catch(() => {});
  updateDirtyIndicator();
  startFilePolling();
  return data;
}

function saveDB(){
  localStorage.setItem(DB_KEY, JSON.stringify(state.db));
  state.dirty = true;
  updateDirtyIndicator();
}

function openFileHandleDB(){
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      resolve(null);
      return;
    }
    const req = indexedDB.open(FILE_HANDLE_DB, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(FILE_HANDLE_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB unavailable'));
  });
}

async function storeFileHandle(handle){
  const db = await openFileHandleDB();
  if (!db) return;
  await new Promise((resolve, reject) => {
    const tx = db.transaction(FILE_HANDLE_STORE, 'readwrite');
    tx.objectStore(FILE_HANDLE_STORE).put(handle, FILE_HANDLE_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error('Could not store file handle'));
  });
  db.close();
}

async function loadStoredFileHandle(){
  const db = await openFileHandleDB();
  if (!db) return null;
  try {
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_HANDLE_STORE, 'readonly');
      const req = tx.objectStore(FILE_HANDLE_STORE).get(FILE_HANDLE_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error || new Error('Could not load file handle'));
    });
  } finally {
    db.close();
  }
}

function cloneHistoryValue(value){
  return value == null ? value : JSON.parse(JSON.stringify(value));
}

function captureHistorySnapshot(){
  return {
    db: cloneHistoryValue(state.db),
    currentView: state.currentView,
    filters: cloneHistoryValue(state.filters),
    chartFocus: cloneHistoryValue(state.chartFocus),
    collapsed: [...state.collapsed],
    taskExpanded: [...state.taskExpanded],
    projectExpanded: [...state.projectExpanded],
    ganttDayWidth: state.ganttDayWidth,
    ganttScroll: cloneHistoryValue(state.ganttScroll),
    source: state.source,
  };
}

function historySnapshotKey(snapshot){
  return JSON.stringify(snapshot);
}

function resetHistory(){
  historyState.undo = [];
  historyState.redo = [];
}

function pushHistorySnapshot(){
  if (historyState.lock || !state.db) return;
  const snapshot = captureHistorySnapshot();
  const key = historySnapshotKey(snapshot);
  const last = historyState.undo[historyState.undo.length - 1];
  if (last && last.key === key) return;
  historyState.undo.push({key, snapshot});
  if (historyState.undo.length > HISTORY_LIMIT) historyState.undo.shift();
  historyState.redo = [];
}

function applyHistorySnapshot(snapshot){
  if (!snapshot) return;
  historyState.lock = true;
  try {
    if (snapshot.db) state.db = normalizeDB(cloneHistoryValue(snapshot.db));
    state.currentView = snapshot.currentView || 'dashboard';
    state.filters = cloneHistoryValue(snapshot.filters) || {};
    state.chartFocus = cloneHistoryValue(snapshot.chartFocus) || {team:'',project:''};
    state.collapsed = new Set(snapshot.collapsed || []);
    state.taskExpanded = new Set(snapshot.taskExpanded || []);
    state.projectExpanded = new Set(snapshot.projectExpanded || []);
    state.ganttDayWidth = clampGanttDayWidth(snapshot.ganttDayWidth || 48);
    state.ganttScroll = cloneHistoryValue(snapshot.ganttScroll) || {top:0,left:0};
    state.source = snapshot.source || state.source;
  } finally {
    historyState.lock = false;
  }
  saveDB();
  closeModal();
  render();
}

function undoAppChange(){
  if (!historyState.undo.length) {
    toast('Nothing to undo', true);
    return;
  }
  const current = captureHistorySnapshot();
  historyState.redo.push({key:historySnapshotKey(current), snapshot:current});
  if (historyState.redo.length > HISTORY_LIMIT) historyState.redo.shift();
  const entry = historyState.undo.pop();
  applyHistorySnapshot(entry.snapshot);
  toast('Undid last change');
}

function redoAppChange(){
  if (!historyState.redo.length) {
    toast('Nothing to redo', true);
    return;
  }
  const current = captureHistorySnapshot();
  historyState.undo.push({key:historySnapshotKey(current), snapshot:current});
  if (historyState.undo.length > HISTORY_LIMIT) historyState.undo.shift();
  const entry = historyState.redo.pop();
  applyHistorySnapshot(entry.snapshot);
  toast('Redid last change');
}

function updateDirtyIndicator(){
  const dot = document.getElementById('dirtyDot');
  if (dot) dot.style.display = state.dirty ? 'inline' : 'none';
  const status = document.getElementById('fileStatus');
  if (status) {
    if (fileHandle) status.innerHTML = 'Linked: ' + fileHandle.name + (state.dirty ? ' (unsaved)' : '');
    else if (!databaseReady) status.innerHTML = 'Pick database.json to begin';
    else status.innerHTML = '';
  }
}

async function ensureLinkedFileHandle(){
  if (fileHandle) return fileHandle;
  try {
    const stored = await loadStoredFileHandle();
    if (stored) {
      await loadDatabaseFromHandle(stored);
      return fileHandle;
    }
  } catch (e) {}
  return null;
}

async function copyPathAndPickFile(){

async function copyStartupDatabasePath(){
  try {
    await navigator.clipboard.writeText(SAVE_FILE_PATH);
    toast('Path copied');
  } catch (e) {
    toast('Copy failed: ' + e.message, true);
  }
}

async function pickStartupDatabaseFile(){
  closeModal();
  const handle = await linkDatabaseFile(false);
  if (!handle) return;
  render();
}

async function saveToFile(){
  const jsonContent = JSON.stringify(state.db, null, 2) + '\n';
  try {
    let handle = await ensureLinkedFileHandle();
    if (!handle) handle = await openSaveLinkDialog();
    if (!handle) return;
    const perm = await handle.queryPermission({mode:'readwrite'});
    const granted = perm === 'granted' ? 'granted' : await handle.requestPermission({mode:'readwrite'});
    if (granted !== 'granted') throw new Error('Write permission denied');
    const writable = await handle.createWritable();
    await writable.write(jsonContent);
    await writable.close();
    const file = await handle.getFile();
    lastFileModified = file.lastModified;
    state.dirty = false;
    updateDirtyIndicator();
    toast('Saved to ' + handle.name);
  } catch (e) {
    toast('Save failed: ' + e.message, true);
    return;
  }
}

async function linkDatabaseFile(silent = false){
  if (!('showOpenFilePicker' in window)) {
    if (!silent) alert('Direct file linking requires Chrome, Edge, or Opera.');
    return null;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{description:'Database JSON', accept:{'application/json':['.json']}}]
    });
    await loadDatabaseFromHandle(handle);
    if (!silent) toast('Linked to ' + handle.name);
    return handle;
  } catch(e) {
    if (e.name !== 'AbortError' && !silent) toast('Link failed: ' + e.message, true);
    return null;
  }
}

async function reloadFromFile(){
  if (state.dirty && !confirm('You have unsaved changes. Reload from database.json anyway?')) return;
  if (await ensureLinkedFileHandle()) {
    try {
      const file = await fileHandle.getFile();
      const text = await file.text();
      const data = parseDatabaseText(text);
      pushHistorySnapshot();
      state.db = data;
      lastFileModified = file.lastModified;
      state.dirty = false;
      state.source = 'file';
      updateDirtyIndicator();
      render();
      toast('Reloaded from ' + fileHandle.name);
      return;
    } catch(e) {
      toast('Reload failed: ' + e.message, true); return;
    }
  }
  if (confirm('No linked file found yet. Pick database.json now?')) {
    await linkDatabaseFile();
  }
}

function startFilePolling(){
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!fileHandle) return;
    try {
      const file = await fileHandle.getFile();
      if (lastFileModified && file.lastModified > lastFileModified + 500) {
        lastFileModified = file.lastModified;
        showUpdateBanner();
      }
    } catch(e) {}
  }, 15000);
}

function showUpdateBanner(){
  if (document.getElementById('updateBanner')) return;
  const b = document.createElement('div');
  b.id = 'updateBanner';
  b.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#E8B84A;color:#2B2B2B;padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.2);z-index:1500;font-size:13px;font-weight:600;display:flex;align-items:center;gap:12px';
  b.innerHTML = 'A teammate updated database.json. <button class="btn btn-primary btn-sm" onclick="reloadFromFile();this.parentElement.remove()">Reload now</button> <button class="btn-icon" onclick="this.parentElement.remove()" style="color:#2B2B2B">✕</button>';
  document.body.appendChild(b);
}

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtN=n=>Number(n||0).toLocaleString('en-US');

const rate=()=>state.db.settings.blendedRate;
function normalizeNcrValue(value){

function taskLogSummary(taskId){
  const logs = taskTimesheetEntries(taskId);

  const byPerson = new Map();
  logs.forEach(x=>{

    const entry = byPerson.get(key) || {personId:x.personId||'', name:personById(x.personId)?.name||'Unassigned', hours:0, budget:0, entries:0};
    entry.hours += (+x.hoursLogged||0);

function taskActualDayTotals(taskOrId){

function syncTaskDailyHours(taskId, date, hours, kind){
  const task = taskById(taskId);
  if (!task || !date) return;
  pushHistorySnapshot();
  const value = roundTaskHours(hours);
  if (kind === 'alloc') {
    const existing = normalizeTaskDailyAllocations(task.dailyAllocations);
    const next = existing.filter(entry => entry.date !== date);
    if (value > 0) next.push({date, hours: value});
    next.sort((a, b) => a.date.localeCompare(b.date));
    task.dailyAllocations = normalizeTaskDailyAllocations(next);
    task.allocatedHours = roundTaskHours(task.dailyAllocations.reduce((sum, entry) => sum + roundTaskHours(entry.hours), 0));
    return;
  }
  const weekEnding = ganttIsoDate(weekEndFriday(parseGanttDate(date)));
  const idx = state.db.timesheet.findIndex(x => x.taskId === task.id && x.dayDate === date);
  if (value <= 0) {
    if (idx >= 0) state.db.timesheet.splice(idx, 1);
    return;
  }
  const data = {
    weekEnding,
    dayDate: date,
    personId: task.assigneeId || '',
    projectId: task.projectId || '',
    taskId: task.id,
    hoursLogged: value,
    billable: 'Y',
    notes: '',
  };
  if (idx >= 0) {
    Object.assign(state.db.timesheet[idx], data);
  } else {
    state.db.timesheet.push({id: uid(), ...data});
  }

function taskBudget(task,hoursKey='actualHours'){
  if(hoursKey==='allocatedHours') return (+task?.allocatedHours || 0) * taskRate(task);
  if(hoursKey==='actualHours') return taskActualBudget(task);
  return (+task?.[hoursKey] || 0) * taskRate(task);
}
function roundTaskHours(value){

function taskDateRange(startValue, endValue){
  const start = parseGanttDate(startValue);
  const end = parseGanttDate(endValue);
  if (!start || !end || end < start) return [];
  const days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(ganttIsoDate(d));
  return days;
}
function taskWorkdayRange(startValue, endValue){
  return taskDateRange(startValue, endValue).filter(date => {
    const d = parseGanttDate(date);
    return d && d.getDay() !== 0 && d.getDay() !== 6;
  });
}
function normalizeTaskDailyAllocations(raw){
  if (Array.isArray(raw)) {
    return raw
      .map(entry => ({
        date: String(entry?.date || '').slice(0, 10),
        hours: roundTaskHours(entry?.hours)
      }))
      .filter(entry => entry.date);
  }
  if (raw && typeof raw === 'object') {
    return Object.entries(raw)
      .map(([date, hours]) => ({date: String(date).slice(0, 10), hours: roundTaskHours(hours)}))
      .filter(entry => entry.date);
  }
  return [];
}
function buildEvenTaskAllocations(dates, totalHours){
  const total = roundTaskHours(totalHours);
  if (!dates.length) return [];
  const base = roundTaskHours(Math.floor((total / dates.length) * 100) / 100);
  const entries = dates.map(date => ({date, hours: base}));
  let remainder = roundTaskHours(total - (base * dates.length));
  let i = 0;
  while (remainder > 0.0001 && i < 5000) {
    entries[i % entries.length].hours = roundTaskHours(entries[i % entries.length].hours + 0.01);
    remainder = roundTaskHours(remainder - 0.01);
    i += 1;
  }
  while (remainder < -0.0001 && i < 10000) {
    entries[i % entries.length].hours = roundTaskHours(Math.max(0, entries[i % entries.length].hours - 0.01));
    remainder = roundTaskHours(remainder + 0.01);
    i += 1;
  }
  return entries;
}
function taskAllocationEntries(task){
  const dates = taskWorkdayRange(task?.startDate, task?.dueDate);
  if (!dates.length) return [];
  const raw = normalizeTaskDailyAllocations(task?.dailyAllocations);
  const byDate = new Map(raw.map(entry => [entry.date, roundTaskHours(entry.hours)]));
  if (raw.length) {
    return dates.map(date => ({date, hours: roundTaskHours(byDate.get(date) || 0)}));
  }
  return buildEvenTaskAllocations(dates, task?.allocatedHours || 0);
}
function taskAllocationTotal(task){
  return taskAllocationEntries(task).reduce((sum, entry) => sum + roundTaskHours(entry.hours), 0);
}
function taskAllocationMap(task){

}
function ganttTaskOverloadDates(tasks){
  const assigneeLoad = new Map();
  tasks.forEach(t => {
    const assigneeId = t?.assigneeId || '__unassigned__';
    const dayLoad = assigneeLoad.get(assigneeId) || new Map();
    taskAllocationEntries(t).forEach(entry => {
      dayLoad.set(entry.date, roundTaskHours((dayLoad.get(entry.date) || 0) + roundTaskHours(entry.hours)));
    });
    assigneeLoad.set(assigneeId, dayLoad);
  });
  const overloadByTask = new Map();
  tasks.forEach(t => {
    const assigneeId = t?.assigneeId || '__unassigned__';
    const dayLoad = assigneeLoad.get(assigneeId);
    const overloadedDates = new Set();
    if (dayLoad) {
      taskAllocationEntries(t).forEach(entry => {
        if ((dayLoad.get(entry.date) || 0) > 8) overloadedDates.add(entry.date);
      });
    }
    overloadByTask.set(t.id, overloadedDates);
  });
  return overloadByTask;
}
function taskAllocationDateLabel(date){

function taskAllocationStatus(task, entries, targetHours){

  const total = roundTaskHours((entries || taskAllocationEntries(task)).reduce((sum, entry) => sum + roundTaskHours(entry.hours), 0));

function captureTaskAllocationInputs(form){

function computeTaskAllocationDraft(task, form, preserveCurrent){
  const allocatedHours = roundTaskHours(form?.elements?.allocatedHours?.value ?? task?.allocatedHours ?? 0);
  const startDate = form?.elements?.startDate?.value ?? task?.startDate ?? '';
  const dueDate = form?.elements?.dueDate?.value ?? task?.dueDate ?? '';
  const dates = taskWorkdayRange(startDate, dueDate);
  if (!dates.length) return {allocatedHours, startDate, dueDate, dates, entries:[]};
  if (form?.dataset?.allocationAutoFill === '1') {
    return {allocatedHours, startDate, dueDate, dates, entries: buildEvenTaskAllocations(dates, allocatedHours)};
  }
  if (form?.dataset?.allocationCleared === '1') {
    return {allocatedHours, startDate, dueDate, dates, entries: dates.map(date => ({date, hours: 0}))};
  }
  const stored = new Map(normalizeTaskDailyAllocations(task?.dailyAllocations).map(entry => [entry.date, roundTaskHours(entry.hours)]));

  const actualHrs=ts.reduce((s,t)=>s+taskActualHours(t),0);
  const allocBudget=+project.allocatedBudget || 0;
  const actualBudget=ts.reduce((s,t)=>s+taskBudget(t,'actualHours'),0);
  return {allocHrs,actualHrs,allocBudget,actualBudget};
}
function personTotals(id){
  const ts=state.db.tasks.filter(t=>t.assigneeId===id && t.taskType!=='leave');
  const allocHrs=ts.reduce((s,t)=>s+(+t.allocatedHours||0),0);
  const actualHrs=state.db.timesheet.filter(x=>x.personId===id).reduce((s,x)=>s+(+x.hoursLogged||0),0);
  return {allocHrs,actualHrs};
}
function personLeaveHoursByWeek(id, weekEnd){
  const weekStart = weekStartSaturday(weekEnd);
  return state.db.tasks
    .filter(t => t.assigneeId === id && t.taskType === 'leave')
    .reduce((sum, t) => {
      const alloc = taskAllocationEntries(t);
      return sum + alloc.reduce((taskSum, entry) => {
        const day = parseGanttDate(entry.date);
        if (!day || day < weekStart || day > weekEnd) return taskSum;
        return taskSum + roundTaskHours(entry.hours);
      }, 0);
    }, 0);
}
function effectiveCapacityForWeek(member, weekEnd){
  const weeklyCapacity = +member?.weeklyCapacity || 40;
  const leaveHours = personLeaveHoursByWeek(member?.id, weekEnd);
  return Math.max(0, weeklyCapacity - leaveHours);
}
function isOverdue(d,st){if(!d)return false;if(st==='Closed'||st==='Completed')return false;return d<todayISO();}
function toast(msg,error=false){
  const el=document.createElement('div');
  el.className='toast'+(error?' error':'');
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
</script>

<script>
// =====================================================
// RENDER
// =====================================================
function render(){
  saveUIState();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===state.currentView));
  const el=document.getElementById('app-content');
  switch(state.currentView){
    case 'dashboard': el.innerHTML=renderDashboardV2(); break;
    case 'projects': el.innerHTML=renderProjects(); break;
    case 'tasks': el.innerHTML=renderTasks(); wireTaskCollapse(); break;
    case 'team': el.innerHTML=renderTeam(); break;
    case 'timesheet': el.innerHTML=renderTimesheet(); break;
    case 'gantt': el.innerHTML=renderGantt(); syncGanttScroll(); initGanttInteractions(); break;
    case 'notes': el.innerHTML=renderNotes(); break;
  }
}

function clampGanttDayWidth(value){
  return Math.max(18, Math.min(96, value));
}

function captureGanttScroll(){
  const rightBody = document.getElementById('ganttRightBody');
  if (!rightBody) return;
  state.ganttScroll = {top:rightBody.scrollTop, left:rightBody.scrollLeft};
}

function zoomGantt(delta){
  pushHistorySnapshot();
  captureGanttScroll();
  state.ganttDayWidth = clampGanttDayWidth((state.ganttDayWidth || 48) + delta);
  render();
}

function parseGanttDate(value){
  if(!value) return null;
  const parts = String(value).split('-').map(Number);
  if(parts.length !== 3 || parts.some(n => Number.isNaN(n))) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function ganttIsoDate(date){
  return [date.getFullYear(), String(date.getMonth() + 1).padStart(2, '0'), String(date.getDate()).padStart(2, '0')].join('-');
}

function ganttAddDays(date, days){
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function ganttDayDiff(a, b){
  const start = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const end = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((end - start) / 86400000);
}

function ganttStartOfWeek(date){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function ganttEndOfWeek(date){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + (6 - d.getDay()));
  return d;
}

function ganttSnapDayFromPx(px, dayWidth){
  return Math.max(0, Math.round(px / dayWidth));
}

function ganttTaskDates(task){
  const start = parseGanttDate(task.startDate) || parseGanttDate(task.dueDate);
  const end = parseGanttDate(task.dueDate) || start;
  return {start, end};
}

function syncGanttScroll(){
  const left=document.getElementById('ganttLeftPane');
  const rightBody=document.getElementById('ganttRightBody');
  const rightHead=document.getElementById('ganttRightHead');
  if(!left||!rightBody||!rightHead) return;
  const headInner=rightHead.querySelector('.gantt-right-head-inner');
  if (left._ganttScrollHandler) left.removeEventListener('scroll', left._ganttScrollHandler);
  if (rightBody._ganttScrollHandler) rightBody.removeEventListener('scroll', rightBody._ganttScrollHandler);
  let lock=false;
  const onLeftScroll=()=>{
    if(lock) return;
    lock=true;
    rightBody.scrollTop=left.scrollTop;
    state.ganttScroll = {top:rightBody.scrollTop, left:rightBody.scrollLeft};
    lock=false;
  };
  const onRightScroll=()=>{
    if(lock) return;
    lock=true;
    left.scrollTop=rightBody.scrollTop;
    if(headInner) headInner.style.transform=`translateX(${-rightBody.scrollLeft}px)`;
    state.ganttScroll = {top:rightBody.scrollTop, left:rightBody.scrollLeft};
    lock=false;
  };
  left._ganttScrollHandler = onLeftScroll;
  rightBody._ganttScrollHandler = onRightScroll;
  left.addEventListener('scroll', onLeftScroll, {passive:true});
  rightBody.addEventListener('scroll', onRightScroll, {passive:true});
  rightBody.scrollTop = state.ganttScroll?.top || 0;
  rightBody.scrollLeft = state.ganttScroll?.left || 0;
  left.scrollTop = rightBody.scrollTop;
  if(headInner) headInner.style.transform=`translateX(${-rightBody.scrollLeft}px)`;
}

function fmtShortDate(value){
  const d = parseGanttDate(value);
  if (!d) return String(value || '');
  return d.toLocaleDateString('en-US', {month:'short', day:'2-digit'});
}

function firstName(value){
  const text = String(value || '').trim();
  if (!text) return '';
  return text.split(/\s+/)[0];
}

function ganttTaskHourEditorsHtml(task, taskStart, dayWidth){
  const allocMap = taskAllocationMap(task);
  const actualMap = taskActualDayTotals(task);
  const start = taskStart || parseGanttDate(task?.startDate) || parseGanttDate(task?.dueDate);
  const end = parseGanttDate(task?.dueDate) || start;
  if (!start || !end) return '';
  const dates = taskWorkdayRange(ganttIsoDate(start), ganttIsoDate(end));
  return dates.map(date => {
    const d = parseGanttDate(date);
    const offsetDays = Math.max(0, ganttDayDiff(taskStart, d || taskStart));
    const left = offsetDays * dayWidth;
    const alloc = roundTaskHours(allocMap.get(date) || 0);
    const actual = String(task?.taskType || '') === 'allocation' ? 0 : roundTaskHours(actualMap.get(date) || 0);
    return `<div class="gantt-bar-hour-cell" style="left:${left}px;width:${dayWidth}px">
      <input class="gantt-hour-input alloc" data-gantt-hour-input="1" data-task-id="${esc(task.id)}" data-date="${esc(date)}" data-kind="alloc" value="${alloc > 0 ? esc(alloc) : ''}" placeholder="0" inputmode="decimal" aria-label="Allocated hours on ${esc(taskAllocationDateLabel(date))}">
      ${String(task?.taskType || '') === 'allocation' ? '' : `<input class="gantt-hour-input actual" data-gantt-hour-input="1" data-task-id="${esc(task.id)}" data-date="${esc(date)}" data-kind="actual" value="${actual > 0 ? esc(actual) : '0'}" placeholder="0" inputmode="decimal" aria-label="Actual hours on ${esc(taskAllocationDateLabel(date))}">`}
    </div>`;
  }).join('');
}

function weekEndFriday(date){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const delta = (5 - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + delta);
  return d;
}

function weekStartSaturday(weekEnd){
  const d = new Date(weekEnd);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - 6);
  return d;
}

function addDaysSafe(date, days){
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function diffDaysInclusive(a, b){
  const start = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const end = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.max(1, Math.floor((end - start) / 86400000) + 1);
}

function hashString(value){
  let hash = 0;
  const str = String(value || '');
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
  }
  return Math.abs(hash);
}

const memberColorOverrides = new Map([
  ['Mrunmai Vaidya', '#0F766E'],
  ['Areesha Rashid', '#C2410C'],
  ['Linn Htet Soe Wai', '#6D28D9']
]);
const memberColorPalette = [
  '#0F766E', '#C2410C', '#6D28D9', '#1D4ED8', '#BE185D', '#15803D',
  '#B45309', '#7C3AED', '#0E7490', '#4D7C0F', '#9D174D', '#7C2D12'
];

function memberColor(member){
  const name = String(member?.name || '').trim();
  if (memberColorOverrides.has(name)) return memberColorOverrides.get(name);
  const seed = member?.id || name || 'member';
  return memberColorPalette[hashString(seed) % memberColorPalette.length];
}

function lerp(a, b, t){
  return a + ((b - a) * t);
}

function hexToRgb(hex){
  const m = String(hex || '').replace('#','').match(/^([0-9a-f]{6})$/i);
  if (!m) return {r:0,g:0,b:0};
  const n = parseInt(m[1], 16);
  return {r:(n >> 16) & 255, g:(n >> 8) & 255, b:n & 255};
}

function rgbToHex({r,g,b}){
  return '#' + [r,g,b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0')).join('');
}

function mixHex(a, b, t){
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);
  return rgbToHex({r: lerp(ca.r, cb.r, t), g: lerp(ca.g, cb.g, t), b: lerp(ca.b, cb.b, t)});
}

function utilizationHeatColor(value){
  const v = Math.max(0, Math.min(100, +value || 0));
  if (v <= 40) return mixHex('#dc2626', '#facc15', v / 40);
  if (v <= 80) return mixHex('#facc15', '#16a34a', (v - 40) / 40);
  return '#16a34a';
}

const projectColorPalette = [
  '#1D4ED8', '#0F766E', '#C2410C', '#7C3AED', '#BE185D', '#15803D',
  '#B45309', '#0E7490', '#4D7C0F', '#9D174D', '#7C2D12', '#6D28D9'
];

function projectColor(project){
  const seed = project?.id || project?.code || project?.shortName || 'project';
  return projectColorPalette[hashString(seed) % projectColorPalette.length];
}

function setUtilizationFocus(key, value){
  if (!state.chartFocus) state.chartFocus = {team:'', project:''};
  state.chartFocus[key] = value || '';
  render();
}

function selectedUtilizationSeries(selectionKey){
  return state.chartFocus?.[selectionKey] || '';
}

function getDashboardWeekWindow(){
  const today = parseGanttDate(todayISO()) || new Date();
  const currentWeekEnd = weekEndFriday(today);
  const startWeekEnd = addDaysSafe(currentWeekEnd, -14);
  const endWeekEnd = addDaysSafe(currentWeekEnd, 140);
  const weeks = [];
  for (let d = new Date(startWeekEnd); d <= endWeekEnd; d = addDaysSafe(d, 7)) weeks.push(new Date(d));
  return {weeks, startWeekEnd, endWeekEnd, currentWeekEnd};
}

function getWeeklyUtilizationChartData(){
  const team = state.db.team.slice();
  const {weeks} = getDashboardWeekWindow();
  const actualTotals = new Map();
  state.db.timesheet.forEach(x => {
    if (!x.weekEnding) return;
    const d = parseGanttDate(x.weekEnding);
    if (!d) return;
    const key = ganttIsoDate(d);
    actualTotals.set(`${x.personId || '__unassigned__'}__${key}`, (actualTotals.get(`${x.personId || '__unassigned__'}__${key}`) || 0) + (+x.hoursLogged || 0));
  });
  const rows = team.map((m, idx) => {
    const actual = [];
    const allocated = [];
    weeks.forEach(weekEnd => {
      const key = ganttIsoDate(weekEnd);
      const actualHours = actualTotals.get(`${m.id}__${key}`) || 0;
      const capacity = effectiveCapacityForWeek(m, weekEnd);
      actual.push({week:key, hours:actualHours, util:capacity ? (actualHours / capacity) * 100 : 0});
      const allocHours = state.db.tasks
        .filter(t => t.assigneeId === m.id && t.taskType !== 'leave')
        .reduce((taskSum, t) => taskSum + taskAllocationEntries(t).reduce((sum, entry) => {
          const day = parseGanttDate(entry.date);
          if (!day || day > weekEnd || day < weekStartSaturday(weekEnd)) return sum;
          return sum + roundTaskHours(entry.hours);
        }, 0), 0);
      allocated.push({week:key, hours:allocHours, util:capacity ? (allocHours / capacity) * 100 : 0});
    });
    return {member:m, color:memberColor(m), actual, allocated};
  });
  return {weeks, rows};
}

function getWeeklyProjectUtilizationChartData(){
  const projects = state.db.projects.slice();
  const {weeks} = getDashboardWeekWindow();
  const actualTotals = new Map();
  state.db.timesheet.forEach(x => {
    if (!x.weekEnding || !x.projectId) return;
    const d = parseGanttDate(x.weekEnding);
    if (!d) return;
    const key = ganttIsoDate(d);
    actualTotals.set(`${x.projectId}__${key}`, (actualTotals.get(`${x.projectId}__${key}`) || 0) + (+x.hoursLogged || 0));
  });
  const rows = projects.map((p) => {
    const capacity = +p.allocatedHours || 0;
    const actual = [];
    const allocated = [];
    weeks.forEach(weekEnd => {
      const key = ganttIsoDate(weekEnd);
      const actualHours = actualTotals.get(`${p.id}__${key}`) || 0;
      actual.push({week:key, hours:actualHours, util:capacity ? (actualHours / capacity) * 100 : 0});
      const allocHours = state.db.tasks
        .filter(t => t.projectId === p.id)
        .reduce((taskSum, t) => taskSum + taskAllocationEntries(t).reduce((sum, entry) => {
          const day = parseGanttDate(entry.date);
          if (!day || day > weekEnd || day < weekStartSaturday(weekEnd)) return sum;
          return sum + roundTaskHours(entry.hours);
        }, 0), 0);
      allocated.push({week:key, hours:allocHours, util:capacity ? (allocHours / capacity) * 100 : 0});
    });
    return {member:p, color:projectColor(p), actual, allocated};
  });
  return {weeks, rows};
}

function getAverageUtilizationChartData(){
  const base = getWeeklyUtilizationChartData();
  if (!base.weeks.length) return {weeks:[], rows:[]};
  const rows = base.weeks.map((week, idx) => {
    const weekKey = ganttIsoDate(week);
    const actuals = base.rows.map(r => r.actual[idx]?.util || 0);
    const allocs = base.rows.map(r => r.allocated[idx]?.util || 0);
    const avgActual = actuals.length ? actuals.reduce((s,n)=>s+n,0) / actuals.length : 0;
    const avgAlloc = allocs.length ? allocs.reduce((s,n)=>s+n,0) / allocs.length : 0;
    return {week:weekKey, actual:avgActual, allocated:avgAlloc};
  });
  return {weeks: base.weeks, rows:[{member:{name:'Average utilization', role:'All team members'}, color:'#4C8B6B', actual: rows.map(r=>({week:r.week, util:r.actual, hours:0})), allocated: rows.map(r=>({week:r.week, util:r.allocated, hours:0}))}]};
}

function buildTimelineHeaderRows(weeks, weekWidth, currentWeekKey){
  const yearSpans = [];
  let start = 0;
  while (start < weeks.length) {
    const base = weeks[start];
    let end = start + 1;
    while (end < weeks.length && weeks[end].getFullYear() === base.getFullYear()) end += 1;
    yearSpans.push({label:String(base.getFullYear()), start, count:end-start});
    start = end;
  }
  const yearRow = yearSpans.map(span => `<div class="util-year-head-cell" style="width:${span.count * weekWidth}px;min-width:${span.count * weekWidth}px">${esc(span.label)}</div>`).join('');
  const weekRow = weeks.map(week => {
    const key = ganttIsoDate(week);
    const active = key === currentWeekKey;
    return `<div class="util-week-head-cell ${active ? 'today' : ''}" style="--util-week-width:${weekWidth}px">${esc(fmtShortDate(key))}</div>`;
  }).join('');
  return {yearRow, weekRow};
}

function renderUtilizationChart(config){
  const data = config.data;
  if (!data.weeks.length) {
    return `<div class="card empty" style="margin-bottom:0">No task log data yet to chart.</div>`;
  }
  const title = config.title || 'Weekly Utilization by Team Member';
  const note = config.note || 'Solid line shows actual hours logged. Dashed line shows allocated hours from the task\'s daily schedule.';
  const includeMemberLegend = config.includeMemberLegend !== false;
  const selectionKey = config.selectionKey || '';
  const selectedSeriesId = selectionKey ? selectedUtilizationSeries(selectionKey) : '';
  const visibleRows = selectedSeriesId ? data.rows.filter(r => String(r.member?.id || '') === String(selectedSeriesId)) : data.rows;
  const chartRows = visibleRows.length ? visibleRows : data.rows;
  const maxUtil = Math.max(100, ...chartRows.flatMap(row => [...row.actual, ...row.allocated].map(v => +v.util || 0)));
  const chartMax = Math.max(100, Math.ceil(maxUtil / 10) * 10);
  const gradientActual = config.gradientActual === true || title === 'Weekly Utilization' || title === 'Weekly Team Utilization';
  const gradientAllocated = config.gradientAllocated === true || title === 'Weekly Utilization' || title === 'Weekly Team Utilization';
  const currentWeekKey = ganttIsoDate(weekEndFriday(parseGanttDate(todayISO())));
  const weekWidth = 54;
  const topPad = 20;
  const bottomPad = 44;
  const headerHeight = 56;
  const chartWidth = data.weeks.length * weekWidth;
  const chartHeight = 300;
  const yTicks = chartMax <= 100 ? [0, 25, 50, 75, 100] : [0, 25, 50, 75, 100, chartMax];
  const xPos = i => (i * weekWidth) + (weekWidth / 2);
  const yPos = pct => topPad + (chartHeight - topPad - bottomPad) - (Math.max(0, Math.min(chartMax, pct)) / chartMax) * (chartHeight - topPad - bottomPad);
  const headers = buildTimelineHeaderRows(data.weeks, weekWidth, currentWeekKey);
  const grid = yTicks.map(p => {
    const y = yPos(p);
    return `<line class="util-grid-line" x1="0" y1="${y}" x2="${chartWidth}" y2="${y}"></line>`;
  }).join('');
  const weekLines = data.weeks.map((_, i) => {
    const x = i * weekWidth;
    const weekKey = ganttIsoDate(data.weeks[i]);
    const isCurrent = weekKey === currentWeekKey;
    const fill = isCurrent ? 'rgba(76,139,107,0.10)' : 'transparent';
    return `<rect x="${x}" y="${topPad}" width="${weekWidth}" height="${chartHeight - topPad - bottomPad}" fill="${fill}"></rect>
            <line class="util-grid-line" x1="${x}" y1="${topPad}" x2="${x}" y2="${chartHeight - bottomPad}"></line>`;
  }).join('');
  const yAxis = yTicks.map(p => `<div class="util-y-label" style="top:${headerHeight + yPos(p)}px">${p}%</div>`).join('');
  const series = chartRows.map((row, idx) => {
    const allocPts = row.allocated.map((v, i) => `${xPos(i).toFixed(1)},${yPos(v.util).toFixed(1)}`).join(' ');
    const actPts = row.actual.map((v, i) => `${xPos(i).toFixed(1)},${yPos(v.util).toFixed(1)}`).join(' ');
    const actualLine = gradientActual
      ? row.actual.slice(0, -1).map((v, i) => {
          const next = row.actual[i + 1];
          const x1 = xPos(i).toFixed(1);
          const y1 = yPos(v.util).toFixed(1);
          const x2 = xPos(i + 1).toFixed(1);
          const y2 = yPos(next.util).toFixed(1);
          const c = utilizationHeatColor(((+v.util || 0) + (+next.util || 0)) / 2);
          return `<line class="util-series-line" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}"></line>`;
        }).join('')
      : `<polyline class="util-series-line" points="${actPts}" stroke="${row.color}"></polyline>`;
    const allocatedLine = gradientAllocated
      ? row.allocated.slice(0, -1).map((v, i) => {
          const next = row.allocated[i + 1];
          const x1 = xPos(i).toFixed(1);
          const y1 = yPos(v.util).toFixed(1);
          const x2 = xPos(i + 1).toFixed(1);
          const y2 = yPos(next.util).toFixed(1);
          const c = utilizationHeatColor(((+v.util || 0) + (+next.util || 0)) / 2);
          return `<line class="util-series-line alloc" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}"></line>`;
        }).join('')
      : `<polyline class="util-series-line alloc" points="${allocPts}" stroke="${row.color}"></polyline>`;
    const actualNodes = row.actual.map((v, i) => {
      const cx = xPos(i).toFixed(1);
      const cy = yPos(v.util).toFixed(1);
      const pct = +v.util || 0;
      const label = `${row.member.shortName || row.member.name || ''}, ${Math.round(pct)}%, ${fmtShortDate(v.week)}`;
      const warn = pct > 100;
      return warn
        ? `<g><circle class="util-series-node over100-ring" cx="${cx}" cy="${cy}" r="9"></circle><circle class="util-series-node actual over100-core" cx="${cx}" cy="${cy}" r="4" fill="${row.color}" stroke="${row.color}"><title>${esc(label)}</title></circle></g>`
        : `<circle class="util-series-node actual" cx="${cx}" cy="${cy}" r="4" fill="${row.color}" stroke="${row.color}"><title>${esc(label)}</title></circle>`;
    }).join('');
    const allocNodes = row.allocated.map((v, i) => {
      const cx = xPos(i).toFixed(1);
      const cy = yPos(v.util).toFixed(1);
      const pct = +v.util || 0;
      const label = `${row.member.shortName || row.member.name || ''}, ${Math.round(pct)}%, ${fmtShortDate(v.week)}`;
      const warn = pct > 100;
      return warn
        ? `<g><circle class="util-series-node over100-ring" cx="${cx}" cy="${cy}" r="9"></circle><circle class="util-series-node alloc over100-core" cx="${cx}" cy="${cy}" r="3.5" fill="${row.color}" stroke="${row.color}"><title>${esc(label)}</title></circle></g>`
        : `<circle class="util-series-node alloc" cx="${cx}" cy="${cy}" r="3.5" fill="${row.color}" stroke="${row.color}"><title>${esc(label)}</title></circle>`;
    }).join('');
    return `<g>
      ${allocatedLine}
      ${actualLine}
      ${allocNodes}
      ${actualNodes}
    </g>`;
  }).join('');
  const rowHasOver100 = row => [...row.actual, ...row.allocated].some(v => (+v.util || 0) > 100);
  return `<div class="card" style="margin-bottom:20px">
    <div class="util-chart-shell">
      <div class="util-chart-top">
        <div>
          <h2 style="margin-bottom:6px">${esc(title)}</h2>
          <div class="util-chart-note">${esc(note)}</div>
        </div>
        <div class="util-legend">
          ${includeMemberLegend ? data.rows.map(r => {
            const id = String(r.member?.id || '');
            const label = esc(r.member.shortName || r.member.name || '');
            const active = selectionKey && selectedSeriesId && id === String(selectedSeriesId);
            const warn = rowHasOver100(r);
            if (selectionKey) {

function renderWeeklyAverageChart(){
  const base = getWeeklyUtilizationChartData();
  if (!base.weeks.length) {
    return `<div class="card empty" style="margin-bottom:20px">No task log data yet to chart.</div>`;
  }
  const rows = base.weeks.map((week, idx) => {
    const actuals = base.rows.map(r => r.actual[idx]?.util || 0);
    const allocs = base.rows.map(r => r.allocated[idx]?.util || 0);
    const avgActual = actuals.length ? actuals.reduce((s, n) => s + n, 0) / actuals.length : 0;
    const avgAlloc = allocs.length ? allocs.reduce((s, n) => s + n, 0) / allocs.length : 0;
    return {week: ganttIsoDate(week), actual: avgActual, allocated: avgAlloc};
  });
  return renderUtilizationChart({
    title: 'Weekly Team Utilization',
    note: 'Average utilization across all team members. Solid line shows average actual utilization and dashed line shows average allocated utilization.',
    includeMemberLegend: false,
    data: {
      weeks: base.weeks,
      rows: [{
        member: {name: 'All team members', role: 'Average across the team'},
        color: '#4C8B6B',
        actual: rows.map(r => ({week: r.week, util: r.actual, hours: 0})),
        allocated: rows.map(r => ({week: r.week, util: r.allocated, hours: 0}))
      }]
    }
  });
}

    return `<div class="project-group ${collapsed?'collapsed':''}" data-pid="${p.id}"><div class="project-group-header"><span class="pg-chevron">&#9660;</span><span class="pg-title">${esc(p.shortName)}</span><span class="pg-code">${esc(p.code)}</span><div class="pg-stats"><div class="pg-stat"><b>${fmtC(tot.actualBudget)} / ${fmtC(tot.allocBudget)}</b><span>Actual/Alloc AED</span></div><div class="pg-stat"><b>${fmtC(tot.allocBudget)}</b><span>Allocated</span></div><div class="pg-stat"><b>${pts.length}</b><span>Tasks</span></div></div></div><div class="project-group-body"><div class="tbl-wrap"><table><colgroup><col style="width:3%"><col style="width:25%"><col style="width:11%"><col style="width:4%"><col style="width:4%"><col style="width:7%"><col style="width:7%"><col style="width:8%"><col style="width:8%"><col style="width:8%"><col style="width:7%"><col style="width:8%"></colgroup><thead><tr><th></th><th>Task</th><th>Assignee</th><th class="num">Alloc</th><th class="num">Actual</th><th class="num">Alloc AED</th><th class="num">Actual AED</th><th>Due</th><th>Status</th><th>Priority</th><th>Actual/Alloc</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
  }).filter(Boolean).join('');
  const internalTasks=tasks.filter(t=>!isProjectTask(t)).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  const internalGroup=internalTasks.length ? (() => {
    const allocHrs=internalTasks.reduce((s,t)=>s+(+t.allocatedHours||0),0);
    const actualHrs=internalTasks.reduce((s,t)=>s+taskActualHours(t),0);
    const allocBudget=internalTasks.reduce((s,t)=>s+taskBudget(t,'allocatedHours'),0);
    const collapsed=state.collapsed.has('__internal__');
    return `<div class="project-group ${collapsed?'collapsed':''}" data-pid="__internal__"><div class="project-group-header"><span class="pg-chevron">&#9660;</span><span class="pg-title">Internal / Leave</span><span class="pg-code">N/A</span><div class="pg-stats"><div class="pg-stat"><b>${fmtC(0)} / ${fmtC(allocBudget)}</b><span>Actual/Alloc AED</span></div><div class="pg-stat"><b>${fmtC(allocBudget)}</b><span>Allocated</span></div><div class="pg-stat"><b>${internalTasks.length}</b><span>Tasks</span></div></div></div><div class="project-group-body"><div class="tbl-wrap"><table><colgroup><col style="width:3%"><col style="width:25%"><col style="width:11%"><col style="width:4%"><col style="width:4%"><col style="width:7%"><col style="width:7%"><col style="width:8%"><col style="width:8%"><col style="width:8%"><col style="width:7%"><col style="width:8%"></colgroup><thead><tr><th></th><th>Task</th><th>Assignee</th><th class="num">Alloc</th><th class="num">Actual</th><th class="num">Alloc AED</th><th class="num">Actual AED</th><th>Due</th><th>Status</th><th>Priority</th><th>Actual/Alloc</th><th></th></tr></thead><tbody>${internalTasks.map(renderRow).join('')}</tbody></table></div></div></div>`;
  })() : '';
  const groups=projectGroups+internalGroup;
  return `<h1 class="view-title">Tasks</h1><p class="view-sub">Grouped by project. Click header to collapse.</p>
  <div class="toolbar"><select onchange="pushHistorySnapshot();state.filters.taskProj=this.value;render()">${projOpts}</select><select onchange="pushHistorySnapshot();state.filters.taskAsg=this.value;render()">${asgOpts}</select><select onchange="pushHistorySnapshot();state.filters.taskStatus=this.value;render()">${stOpts}</select><input type="text" placeholder="Search…" value="${esc(f.taskSearch||'')}" oninput="state.filters.taskSearch=this.value;render()"><span class="spacer"></span><button class="btn btn-primary" onclick="openTaskModal()">+ Add Task</button></div>
  ${groups||`<div class="card empty">No tasks match your filters.</div>`}`;
}

function wireTaskCollapse(){

      const pid=h.parentElement.dataset.pid;
      if(state.collapsed.has(pid)) state.collapsed.delete(pid); else state.collapsed.add(pid);
      h.parentElement.classList.toggle('collapsed');
